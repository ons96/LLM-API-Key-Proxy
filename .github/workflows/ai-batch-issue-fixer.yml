name: AI Batch Issue Fixer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        batch:
          - "133,132,131,130,129,128"
          - "127,126,125,124,123,122"
          - "121,120,119,118,117,116"
          - "115,114,113,112,111,110"
          - "109,108,107,106,105,104"
          - "103,102,101,100,99,98"
          - "97,96,95,94,93,92"
          - "91,90,89,88,87,86"
          - "85,84,83,82,81,80"
          - "79,78,77,76,75,74"
          - "73,72,71,70,69,68"
          - "67,66,65,64,63,62"
          - "61,60,59,58,57,56"
          - "55,54,53,52,51,50"
          - "49,48,47,46,45,44"
          - "43,42,41,40,39,38"
          - "37,36,35,34,33,32"
          - "31,30,29,28,27,26"
          - "25,24,23,22,21,20"
          - "19,18,17"
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process issue batch
        env:
          KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY }}
          BATCH: ${{ matrix.batch }}
        run: |
          set -uo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MODELS="moonshotai/kimi-k2.5:free minimax/minimax-m2.5:free arcee-ai/trinity-large-preview:free stepfun/step-3.5-flash:free corethink:free"

          for issue_num in $(echo "$BATCH" | tr ',' ' '); do
            echo "=== Processing issue #$issue_num ==="

            ISSUE_TITLE=$(gh issue view "$issue_num" --json title --jq '.title' 2>/dev/null || echo "Unknown")
            ISSUE_BODY=$(gh issue view "$issue_num" --json body --jq '.body' 2>/dev/null | head -c 2000 || echo "")
            echo "Issue: $ISSUE_TITLE"

            FILE_TREE=$(find src config -type f \( -name "*.py" -o -name "*.yaml" -o -name "*.yml" \) 2>/dev/null | sort | head -60 | tr '\n' ' ' || echo "")

            KEYWORDS=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '\n' | grep -v '^.\{1,2\}$' | head -5 | tr '\n' '|' | sed 's/|$//' || echo "")
            RELEVANT_FILES=""
            if [ -n "$KEYWORDS" ]; then
              RELEVANT_FILES=$(find src config -type f \( -name "*.py" -o -name "*.yaml" \) 2>/dev/null | grep -iE "$KEYWORDS" | head -3 || true)
            fi
            if [ -z "$RELEVANT_FILES" ]; then
              RELEVANT_FILES="src/proxy_app/main.py"
            fi

            FILE_CONTENTS=""
            for f in $RELEVANT_FILES; do
              if [ -f "$f" ]; then
                FILE_CONTENTS="${FILE_CONTENTS}--- $f ---
$(head -200 "$f")
"
              fi
            done

            printf '%s\n' "You are an expert Python/FastAPI software engineer." > prompt.txt
            printf '%s\n' "Repository layout (partial): $FILE_TREE" >> prompt.txt
            printf '%s\n' "" >> prompt.txt
            printf '%s\n' "Relevant file contents:" >> prompt.txt
            printf '%s\n' "$FILE_CONTENTS" >> prompt.txt
            printf '%s\n' "" >> prompt.txt
            printf '%s\n' "GitHub Issue #${issue_num}: $ISSUE_TITLE" >> prompt.txt
            printf '%s\n' "" >> prompt.txt
            printf '%s\n' "Description: $ISSUE_BODY" >> prompt.txt
            printf '%s\n' "" >> prompt.txt
            printf '%s\n' "Task: Implement the changes needed to resolve this issue." >> prompt.txt
            printf '%s\n' "For each file to create or modify, output a block in this EXACT format:" >> prompt.txt
            printf '%s\n' "=== FILE: path/to/file.py ===" >> prompt.txt
            printf '%s\n' "<complete new file contents>" >> prompt.txt
            printf '%s\n' "=== END FILE ===" >> prompt.txt
            printf '%s\n' "Only allowed path prefixes: src/, config/, docs/" >> prompt.txt
            printf '%s\n' "Output ONLY file blocks. No prose outside blocks." >> prompt.txt

            AI_OUTPUT=""
            PROMPT_CONTENT=$(cat prompt.txt)
            for model in $MODELS; do
              echo "Trying model: $model for issue #$issue_num"
              PAYLOAD=$(jq -n \
                --arg model "$model" \
                --arg content "$PROMPT_CONTENT" \
                '{model: $model, max_tokens: 8192, messages: [{role: "user", content: $content}]}')

              RESP=$(curl -sf --max-time 120 \
                -X POST "https://api.kilo.ai/api/gateway/chat/completions" \
                -H "Authorization: Bearer ${KILOCODE_API_KEY:-free}" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" 2>&1) || true

              AI_OUTPUT=$(echo "$RESP" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
              if [ -n "$AI_OUTPUT" ]; then
                echo "Model $model succeeded for issue #$issue_num"
                break
              fi
              echo "Model $model failed, trying next..."
            done

            if [ -z "$AI_OUTPUT" ]; then
              echo "All models failed for issue #$issue_num, skipping"
              continue
            fi

            echo "$AI_OUTPUT" > ai_output_raw.txt

            printf '%s\n' 'import sys, os, re' > parse_ai.py
            printf '%s\n' 'with open("ai_output_raw.txt") as f: content = f.read()' >> parse_ai.py
            printf '%s\n' 'pattern = r"=== FILE: (.+?) ===\n(.*?)=== END FILE ==="' >> parse_ai.py
            printf '%s\n' 'matches = re.findall(pattern, content, re.DOTALL)' >> parse_ai.py
            printf '%s\n' 'allowed = ("src/", "config/", "docs/")' >> parse_ai.py
            printf '%s\n' 'count = 0' >> parse_ai.py
            printf '%s\n' 'for path, body in matches:' >> parse_ai.py
            printf '%s\n' '    path = path.strip()' >> parse_ai.py
            printf '%s\n' '    if not any(path.startswith(p) for p in allowed): continue' >> parse_ai.py
            printf '%s\n' '    dirpath = os.path.dirname(path)' >> parse_ai.py
            printf '%s\n' '    if dirpath: os.makedirs(dirpath, exist_ok=True)' >> parse_ai.py
            printf '%s\n' '    open(path, "w").write(body)' >> parse_ai.py
            printf '%s\n' '    print(f"Wrote: {path}", file=sys.stderr)' >> parse_ai.py
            printf '%s\n' '    count += 1' >> parse_ai.py
            printf '%s\n' 'print(count)' >> parse_ai.py
            FILES_WRITTEN=$(python3 parse_ai.py)

            echo "Files written: $FILES_WRITTEN"

            if [ "${FILES_WRITTEN:-0}" -eq 0 ] 2>/dev/null || [ -z "$FILES_WRITTEN" ]; then
              echo "No file blocks produced for issue #$issue_num, skipping PR"
              git checkout main 2>/dev/null || true
              continue
            fi

            BRANCH="fix/issue-${issue_num}"
            git checkout -B "$BRANCH"
            git add -A

            if git diff --staged --quiet; then
              echo "No staged changes for issue #$issue_num"
              git checkout main 2>/dev/null || true
              continue
            fi

            SAFE_TITLE=$(echo "$ISSUE_TITLE" | head -c 60)
            git commit -m "fix: resolve issue #${issue_num} - ${SAFE_TITLE}"
            git push origin "$BRANCH" --force-with-lease || true

            gh pr create \
              --title "fix: issue #${issue_num} - ${SAFE_TITLE}" \
              --body "Closes #${issue_num}

          AI-generated fix using Kilo Gateway free models." \
              --head "$BRANCH" \
              --base main || true

            git checkout main 2>/dev/null || true
            echo "=== Done with issue #$issue_num ==="
          done
