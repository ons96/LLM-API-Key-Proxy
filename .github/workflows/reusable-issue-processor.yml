name: Reusable Autonomous Issue Processor

on:
  workflow_call:
    inputs:
      max_issues:
        description: 'Maximum issues to process'
        required: false
        default: 20
        type: number
      max_parallel:
        description: 'Maximum parallel jobs (GitHub free tier: 20)'
        required: false
        default: 20
        type: number
      timeout_minutes:
        description: 'Timeout per issue in minutes'
        required: false
        default: 30
        type: number
      dry_run:
        description: 'Analyze only, no PRs'
        required: false
        default: false
        type: boolean
    secrets:
      BOT_APP_ID:
        required: true
      BOT_PRIVATE_KEY:
        required: true
      PROXY_API_KEY:
        required: false
      KILOCODE_API_KEY:
        required: false
      ZEN_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      GROQ_API_KEY:
        required: false
      TOGETHER_API_KEY:
        required: false
      CEREBRAS_API_KEY:
        required: false

outputs:
  issues_processed:
    description: 'Number of issues processed'
    value: ${{ jobs.discover.outputs.count }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.find.outputs.issues }}
      count: ${{ steps.find.outputs.count }}

    steps:
    - uses: actions/checkout@v4

    - name: Find eligible issues
      id: find
      run: |
        ISSUES=$(gh issue list \
          --state open \
          --json number,title,body,labels \
          --search "-label:wontfix -label:invalid -label:duplicate -label:in-progress" \
          --limit ${{ inputs.max_issues }})

        COUNT=$(echo "$ISSUES" | jq 'length')
        echo "issues=${ISSUES}" >> $GITHUB_OUTPUT
        echo "count=${COUNT}" >> $GITHUB_OUTPUT
        echo "Found $COUNT issues, processing up to ${{ inputs.max_parallel }} in parallel"
      env:
        GH_TOKEN: ${{ github.token }}

  process:
    needs: discover
    if: needs.discover.outputs.count > 0
    runs-on: ubuntu-latest
    strategy:
      max-parallel: ${{ inputs.max_parallel }}
      fail-fast: false
      matrix:
        issue: ${{ fromJson(needs.discover.outputs.issues) }}

    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate App Token
      id: token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.BOT_APP_ID }}
        private-key: ${{ secrets.BOT_PRIVATE_KEY }}

    - name: Configure OpenCode with Multi-Provider Fallback
      shell: bash
      run: |
        mkdir -p ~/.config/opencode

        PROVIDER_JSON=$(cat << 'EOF'
        {
          "$schema": "https://opencode.ai/config.json",
          "username": "mirrobot-agent",
          "autoupdate": true,
          "provider": {
            "kilocode": {
              "name": "Kilo Code Gateway",
              "options": {
                "baseURL": "https://gateway.kilo.ai/v1",
                "apiKey": "${{ secrets.KILOCODE_API_KEY || secrets.PROXY_API_KEY }}"
              },
              "models": {
                "auto": { "context_length": 128000 },
                "auto-fast": { "context_length": 32000 }
              }
            },
            "zen": {
              "name": "OpenCode Zen",
              "options": {
                "baseURL": "https://opencode.ai/zen/v1",
                "apiKey": "${{ secrets.ZEN_API_KEY || secrets.PROXY_API_KEY }}"
              },
              "models": {
                "auto": { "context_length": 128000 }
              }
            },
            "openrouter": {
              "name": "OpenRouter Free",
              "options": {
                "baseURL": "https://openrouter.ai/api/v1",
                "apiKey": "${{ secrets.OPENROUTER_API_KEY || secrets.PROXY_API_KEY }}"
              },
              "models": {
                "meta-llama/llama-3.3-70b-instruct:free": { "context_length": 128000 }
              }
            },
            "groq": {
              "name": "Groq",
              "options": {
                "baseURL": "https://api.groq.com/openai/v1",
                "apiKey": "${{ secrets.GROQ_API_KEY || secrets.PROXY_API_KEY }}"
              },
              "models": {
                "llama-3.3-70b-versatile": { "context_length": 128000 }
              }
            },
            "together": {
              "name": "Together AI",
              "options": {
                "baseURL": "https://api.together.xyz/v1",
                "apiKey": "${{ secrets.TOGETHER_API_KEY || secrets.PROXY_API_KEY }}"
              },
              "models": {
                "meta-llama/Llama-3.3-70B-Instruct-Turbo": { "context_length": 128000 }
              }
            },
            "cerebras": {
              "name": "Cerebras",
              "options": {
                "baseURL": "https://api.cerebras.ai/v1",
                "apiKey": "${{ secrets.CEREBRAS_API_KEY || secrets.PROXY_API_KEY }}"
              },
              "models": {
                "llama-3.3-70b": { "context_length": 128000 }
              }
            }
          }
        }
        EOF
        )

        echo "$PROVIDER_JSON" > ~/.config/opencode/opencode.json
        echo "Configured multi-provider fallback system"

    - name: Install OpenCode
      run: curl -fsSL https://opencode.ai/install | bash

    - name: Mark issue in-progress
      run: |
        gh issue edit "${{ matrix.issue.number }}" --add-label "in-progress"
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}

    - name: Process issue
      id: process
      run: |
        BRANCH="fix/issue-${{ matrix.issue.number }}-$(date +%s)"
        git checkout -b "$BRANCH"

        ISSUE_TITLE="${{ matrix.issue.title }}"
        ISSUE_BODY="${{ matrix.issue.body }}"

        PROMPT=$(cat << HEREDOC
        Fix GitHub issue #${{ matrix.issue.number }}

        Title: $ISSUE_TITLE

        Body:
        $ISSUE_BODY

        Rules:
        1. Make minimal changes to fix the issue
        2. Follow existing code patterns
        3. If you cannot fix it, explain why
        4. Create a PR with 'Fixes #${{ matrix.issue.number }}' in the body
        HEREDOC
        )

        opencode --prompt "$PROMPT" --non-interactive --timeout 1800 2>&1 | tee output.log || true

        if git diff --exit-code; then
          echo "status=no-changes" >> $GITHUB_OUTPUT
        else
          echo "status=changes" >> $GITHUB_OUTPUT
        fi
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT

    - name: Create PR
      if: steps.process.outputs.status == 'changes' && inputs.dry_run == false
      run: |
        git config user.name "mirrobot-agent[bot]"
        git config user.email "mirrobot-agent[bot]@users.noreply.github.com"
        git add -A
        git commit -m "fix: ${{ matrix.issue.title }} (closes #${{ matrix.issue.number }})"
        git push origin ${{ steps.process.outputs.branch }}

        gh pr create \
          --title "Fix: ${{ matrix.issue.title }}" \
          --body "Automated fix for issue #${{ matrix.issue.number }}. Fixes #${{ matrix.issue.number }}" \
          --label "ai-generated"
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}

    - name: Handle no changes
      if: steps.process.outputs.status == 'no-changes'
      run: |
        gh issue comment "${{ matrix.issue.number }}" \
          --body "AI analyzed but could not determine an automated fix. This issue may require human discussion."
        gh issue edit "${{ matrix.issue.number }}" \
          --remove-label "in-progress" \
          --add-label "needs-discussion"
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
