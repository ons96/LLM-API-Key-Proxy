name: AI Single-Issue Fixer (Manual / Fallback)

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix-issue:
    runs-on: ubuntu-latest

    # Only run on issue_comment if the comment contains /fix or /opencode
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '/fix'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Resolve the issue number from whichever trigger fired.
      # We do this in env FIRST so the # character never touches YAML parsing.
      - name: Resolve issue number
        id: resolve
        env:
          COMMENT_ISSUE: ${{ github.event.issue.number }}
          DISPATCH_ISSUE: ${{ inputs.issue_number }}
        run: |
          if [ -n "$COMMENT_ISSUE" ]; then
            echo "issue_number=$COMMENT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=$DISPATCH_ISSUE" >> "$GITHUB_OUTPUT"
          fi

      # Get issue details for branch naming
      - name: Get issue details
        id: issue-details
        env:
          ISSUE_NUM: ${{ steps.resolve.outputs.issue_number }}
        run: |
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title')
          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body')
          echo "title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          # Create a kebab-case slug from issue title (max 20 chars for slug portion)
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//' | cut -c1-20)
          BRANCH="fix/issue-${ISSUE_NUM}-${SLUG}"
          # Ensure branch name doesn't exceed 40 chars
          if [ ${#BRANCH} -gt 40 ]; then
            BRANCH="fix/issue-${ISSUE_NUM}-${SLUG:0:$((40 - 14))}"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run OpenCode Agent
        uses: opencode-ai/opencode-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: 'anthropic/claude-sonnet-4-5'
          prompt: >
            Fix issue number ${{ steps.resolve.outputs.issue_number }}
            in this repository. Investigate the root cause, implement
            a fix, commit the changes to a new branch called "${{ steps.issue-details.outputs.branch }}",
            and open a pull request referencing the issue.

      # Ensure ai-fix label exists
      - name: Ensure labels exist
        run: |
          gh label create "ai-fix" --repo "${{ github.repository }}" --color "28a745" --description "AI-generated fix" 2>/dev/null || true
          gh label create "ai-fix-pending" --repo "${{ github.repository }}" --color "0075ca" --description "AI fix PR is open" 2>/dev/null || true

      # Auto-merge the PR if all checks pass (requires branch protection
      # rules to allow auto-merge, or use merge-queue).
      - name: Enable auto-merge on new PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.resolve.outputs.issue_number }}
          BRANCH_NAME: ${{ steps.issue-details.outputs.branch }}
        run: |
          set -euo pipefail

          echo "Looking for PR linked to issue #${ISSUE_NUM}..."

          # Poll up to 3 minutes for OpenCode to open the PR
          PR_URL=""
          PR_NUM=""
          for i in $(seq 1 18); do
            # Look for PR with our branch name pattern
            PR_DATA=$(gh pr list \
              --state open \
              --json number,headRefName,url \
              --jq ".[] | select(.headRefName | contains(\"${ISSUE_NUM}\"))" 2>/dev/null || echo "")
            
            if [ -n "$PR_DATA" ]; then
              PR_URL=$(echo "$PR_DATA" | jq -r '.url')
              PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
              echo "Found PR: $PR_URL"
              break
            fi

            echo "Waiting for PR... attempt $i/18"
            sleep 10
          done

          if [ -z "$PR_URL" ]; then
            echo "No PR found for issue #${ISSUE_NUM} after 3 minutes. Skipping auto-merge."
            # Post failure comment on issue
            gh issue comment "$ISSUE_NUM" --body "❌ Could not fix — manual review needed

**Reason:** PR was not created within expected timeframe.

The AI agent may have encountered issues during the fix process. Please review manually." 2>/dev/null || true
            exit 0
          fi

          # Add ai-fix label to PR
          gh pr edit "$PR_URL" --add-label "ai-fix" 2>/dev/null || true
          
          # Try to assign the repo owner as reviewer
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          gh pr edit "$PR_URL" --add-reviewer "$REPO_OWNER" 2>/dev/null || true

          # Wait for CI checks to complete (up to 5 minutes)
          echo "Waiting for CI checks..."
          for i in $(seq 1 30); do
            # Check if all required checks have passed
            STATUS=$(gh pr view "$PR_URL" --json statusCheckRollup --jq '.statusCheckRollup[]?.state' 2>/dev/null || echo "")
            if echo "$STATUS" | grep -q "FAILURE"; then
              echo "CI checks failed!"
              # Post failure comment on issue
              gh issue comment "$ISSUE_NUM" --body "⚠️ Fix attempted — CI failing

**Branch:** \`$BRANCH_NAME\`
**PR:** $PR_URL

**Status:** CI checks are failing.

The AI agent generated a fix but some CI checks are failing. The PR has been left open for manual review. Please check the CI failures and fix as needed." 2>/dev/null || true
              exit 0
            fi
            
            # Check if we're pending
            PENDING=$(gh pr view "$PR_URL" --json statusCheckRollup --jq '.statusCheckRollup[]?.state' 2>/dev/null | grep -c "PENDING" || echo "0")
            if [ "$PENDING" -eq 0 ]; then
              # No pending checks, assume success
              break
            fi
            
            echo "Waiting for CI... attempt $i/30"
            sleep 10
          done

          # Try to auto-merge
          if gh pr merge "$PR_URL" --auto --squash --delete-branch 2>/dev/null; then
            # Post success comment on issue
            gh issue comment "$ISSUE_NUM" --body "✅ Fix PR opened

**Branch:** \`$BRANCH_NAME\`
**PR:** $PR_URL

**Status:** Fix merged successfully!

The AI agent successfully fixed this issue and the changes have been merged." 2>/dev/null || true
            
            # Update issue labels
            gh issue edit "$ISSUE_NUM" --add-label "ai-fix" --remove-label "ai-fix-pending" 2>/dev/null || true
          else
            # Could not auto-merge (may require manual review or checks not passing)
            echo "Could not auto-merge, PR may need manual review"
            # Post status comment on issue
            gh issue comment "$ISSUE_NUM" --body "✅ Fix PR opened

**Branch:** \`$BRANCH_NAME\`
**PR:** $PR_URL

**Status:** PR created but could not be auto-merged.

The AI agent has created a fix for this issue. The PR is ready for review. Please review the changes and merge when ready." 2>/dev/null || true
          fi
