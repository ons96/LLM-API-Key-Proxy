name: AI Batch Issue Fixer

on:
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated list of owner/repo to scan (leave empty for all 25)'
        required: false
        default: ''
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  collect-issues:
    runs-on: ubuntu-latest
    outputs:
      issue_batches: ${{ steps.collect.outputs.issue_batches }}
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: Collect open issues across repos
        id: collect
        run: |
          set -uo pipefail

          INPUT_REPOS="${{ github.event.inputs.repos }}"
          if [ -n "$INPUT_REPOS" ]; then
            REPOS=$(echo "$INPUT_REPOS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          else
            REPOS="ons96/LLM-API-Key-Proxy
          ons96/gas-fees-dashboard
          ons96/oracle-freetier-instance-creation
          ons96/llm-leaderboard
          ons96/agentic_gateway
          ons96/free_research_agent
          ons96/llm-provider-tracker
          ons96/esimdb_scraper
          ons96/flask_app
          ons96/deep-research
          ons96/edit
          ons96/puter-free-chatbot
          ons96/my-ai-chatbot
          ons96/defi-risk-yield-scanner
          ons96/credit_card_optimizer
          ons96/kimovil-scraper
          ons96/muckbrass_scraper
          ons96/car-deal-finder
          ons96/dashboard-light_scraper
          ons96/Autonomous_LLM_Router
          ons96/llm-leaderboard-aggregate
          ons96/esimdb-colab-code
          ons96/AI_RP_app
          ons96/vincentric_scraper
          ons96/ish_api_tools"
          fi

          ALL_ISSUES="[]"

          while IFS= read -r REPO; do
            [ -z "$REPO" ] && continue
            echo "=== Fetching issues for $REPO ==="

            REPO_ISSUES=$(gh api "repos/${REPO}/issues?state=open&per_page=100" \
              --jq --arg repo "$REPO" \
              '[.[] | select(.pull_request == null) | {number: .number, title: .title, body: (.body // ""), repo: $repo}]' \
              2>/dev/null || echo "[]")

            if [ "$REPO_ISSUES" = "[]" ] || [ -z "$REPO_ISSUES" ]; then
              echo "No open issues for $REPO"
              continue
            fi

            echo "Found $(echo "$REPO_ISSUES" | jq 'length') open issues in $REPO"

            # Filter out issues that already have an open fix PR
            FILTERED="[]"
            while IFS= read -r issue_json; do
              [ -z "$issue_json" ] && continue
              NUM=$(echo "$issue_json" | jq -r '.number')
              EXISTING_PR=$(gh pr list --repo "$REPO" --head "fix/issue-${NUM}" --state open --json number --jq 'length' 2>/dev/null || echo "0")
              if [ "${EXISTING_PR:-0}" -gt 0 ] 2>/dev/null; then
                echo "  Skipping issue #$NUM — open PR already exists"
              else
                FILTERED=$(echo "$FILTERED" | jq --argjson issue "$issue_json" '. + [$issue]')
              fi
            done < <(echo "$REPO_ISSUES" | jq -c '.[]')

            echo "  After PR filter: $(echo "$FILTERED" | jq 'length') issues remaining"
            ALL_ISSUES=$(echo "$ALL_ISSUES" | jq --argjson new "$FILTERED" '. + $new')
          done <<< "$REPOS"

          TOTAL=$(echo "$ALL_ISSUES" | jq 'length')
          echo "Total issues to fix: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "issue_batches=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Chunk ALL_ISSUES into batches of 6, output as JSON array of JSON strings
          printf '%s\n' 'import sys, json' > chunk.py
          printf '%s\n' 'issues = json.load(sys.stdin)' >> chunk.py
          printf '%s\n' 'batch_size = 6' >> chunk.py
          printf '%s\n' 'batches = []' >> chunk.py
          printf '%s\n' 'for i in range(0, len(issues), batch_size):' >> chunk.py
          printf '%s\n' '    chunk = issues[i:i+batch_size]' >> chunk.py
          printf '%s\n' '    batches.append(json.dumps(chunk))' >> chunk.py
          printf '%s\n' 'print(json.dumps(batches))' >> chunk.py

          BATCHES=$(echo "$ALL_ISSUES" | python3 chunk.py)
          echo "Batches: $(echo "$BATCHES" | jq 'length')"
          echo "issue_batches=$BATCHES" >> "$GITHUB_OUTPUT"

  fix-issues:
    needs: collect-issues
    if: >-
      needs.collect-issues.outputs.issue_batches != '[]' &&
      needs.collect-issues.outputs.issue_batches != 'null' &&
      needs.collect-issues.outputs.issue_batches != ''
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        batch: ${{ fromJson(needs.collect-issues.outputs.issue_batches) }}
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
      KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY }}
      BATCH: ${{ matrix.batch }}
    steps:
      - name: Process issue batch
        run: |
          set -uo pipefail

          MODELS_CONFIG=""
          MODELS_CONFIG="${MODELS_CONFIG}moonshotai/kimi-k2.5:free|https://api.kilo.ai/api/gateway/chat/completions|${KILOCODE_API_KEY:-free}\n"
          MODELS_CONFIG="${MODELS_CONFIG}minimax/minimax-m2.5:free|https://api.kilo.ai/api/gateway/chat/completions|${KILOCODE_API_KEY:-free}\n"
          MODELS_CONFIG="${MODELS_CONFIG}minimax-m2.5-free|https://opencode.ai/zen/v1/chat/completions|opencode\n"
          MODELS_CONFIG="${MODELS_CONFIG}arcee-ai/trinity-large-preview:free|https://api.kilo.ai/api/gateway/chat/completions|${KILOCODE_API_KEY:-free}\n"
          MODELS_CONFIG="${MODELS_CONFIG}stepfun/step-3.5-flash:free|https://api.kilo.ai/api/gateway/chat/completions|${KILOCODE_API_KEY:-free}\n"
          MODELS_CONFIG="${MODELS_CONFIG}corethink:free|https://api.kilo.ai/api/gateway/chat/completions|${KILOCODE_API_KEY:-free}"
          MODELS_CONFIG=$(printf "%b" "$MODELS_CONFIG")

          WORKDIR="$(pwd)/repo_clones"
          mkdir -p "$WORKDIR"

          while IFS= read -r issue_json; do
            [ -z "$issue_json" ] && continue

            REPO=$(echo "$issue_json" | jq -r '.repo')
            NUM=$(echo "$issue_json" | jq -r '.number')
            ISSUE_TITLE=$(echo "$issue_json" | jq -r '.title')
            ISSUE_BODY=$(echo "$issue_json" | jq -r '.body' | head -c 2000)
            REPO_SLUG=$(echo "$REPO" | tr '/' '_')
            CLONE_DIR="${WORKDIR}/${REPO_SLUG}"

            echo "=== Processing $REPO #$NUM: $ISSUE_TITLE ==="

            # Re-check issue state at fix time
            ISSUE_STATE=$(gh issue view "$NUM" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "unknown")
            if [ "$ISSUE_STATE" != "open" ]; then
              echo "Issue #$NUM in $REPO is no longer open, skipping"
              continue
            fi

            # Re-check for existing open PR
            EXISTING_PR=$(gh pr list --repo "$REPO" --head "fix/issue-${NUM}" --state open --json number --jq 'length' 2>/dev/null || echo "0")
            if [ "${EXISTING_PR:-0}" -gt 0 ] 2>/dev/null; then
              echo "Open PR already exists for $REPO #$NUM, skipping"
              continue
            fi

            # Ensure ai-fix-pending label exists in target repo
            gh label create "ai-fix-pending" --repo "$REPO" --color "0075ca" --description "AI fix PR is open" 2>/dev/null || true

            # Clone repo if not already cloned in this batch run
            if [ ! -d "$CLONE_DIR/.git" ]; then
              echo "Cloning $REPO..."
              gh repo clone "$REPO" "$CLONE_DIR" -- --depth=1 2>/dev/null || {
                echo "Failed to clone $REPO, skipping issue #$NUM"
                continue
              }
            fi

            pushd "$CLONE_DIR" > /dev/null

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # Reset to default branch (handle both main and master)
            DEFAULT_BRANCH=$(git remote show origin 2>/dev/null | grep 'HEAD branch' | awk '{print $NF}' || echo "main")
            git checkout "$DEFAULT_BRANCH" 2>/dev/null || git checkout main 2>/dev/null || true
            git pull origin "$DEFAULT_BRANCH" 2>/dev/null || true

            # Build file context from cloned repo
            FILE_TREE=$(find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.js" -o -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.md" \) \
              ! -path "./.git/*" ! -path "./node_modules/*" ! -path "./__pycache__/*" ! -path "./.venv/*" ! -path "./venv/*" ! -path "./dist/*" ! -path "./build/*" \
              2>/dev/null | sed 's|^\./||' | sort | head -80 | tr '\n' ' ' || echo "")

            # Find relevant files based on keywords from issue title
            KEYWORDS=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '\n' | grep -v '^.\{1,2\}$' | head -5 | tr '\n' '|' | sed 's/|$//' || echo "")
            RELEVANT_FILES=""
            if [ -n "$KEYWORDS" ]; then
              RELEVANT_FILES=$(find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.js" -o -name "*.yaml" \) \
                ! -path "./.git/*" ! -path "./node_modules/*" ! -path "./__pycache__/*" \
                2>/dev/null | grep -iE "$KEYWORDS" | sed 's|^\./||' | head -5 || true)
            fi
            # Fallback: grab a few top-level source files
            if [ -z "$RELEVANT_FILES" ]; then
              RELEVANT_FILES=$(find . -maxdepth 3 -type f -name "*.py" ! -path "./.git/*" ! -path "./__pycache__/*" 2>/dev/null | sed 's|^\./||' | sort | head -4 || echo "")
            fi

            rm -f /tmp/file_contents_$$.txt
            for f in $RELEVANT_FILES; do
              if [ -f "$f" ]; then
                printf '%s\n' "--- $f ---" >> /tmp/file_contents_$$.txt
                head -200 "$f" >> /tmp/file_contents_$$.txt
                printf '\n' >> /tmp/file_contents_$$.txt
              fi
            done
            FILE_CONTENTS=$(cat /tmp/file_contents_$$.txt 2>/dev/null || echo "")
            rm -f /tmp/file_contents_$$.txt

            # Build prompt
            printf '%s\n' "You are an expert software engineer." > /tmp/prompt_$$.txt
            printf '%s\n' "Repository: ${REPO}" >> /tmp/prompt_$$.txt
            printf '%s\n' "Repository file layout (partial): $FILE_TREE" >> /tmp/prompt_$$.txt
            printf '%s\n' "" >> /tmp/prompt_$$.txt
            printf '%s\n' "Relevant file contents:" >> /tmp/prompt_$$.txt
            printf '%s\n' "$FILE_CONTENTS" >> /tmp/prompt_$$.txt
            printf '%s\n' "" >> /tmp/prompt_$$.txt
            printf '%s\n' "GitHub Issue #${NUM}: $ISSUE_TITLE" >> /tmp/prompt_$$.txt
            printf '%s\n' "" >> /tmp/prompt_$$.txt
            printf '%s\n' "Description: $ISSUE_BODY" >> /tmp/prompt_$$.txt
            printf '%s\n' "" >> /tmp/prompt_$$.txt
            printf '%s\n' "Task: Implement the changes needed to resolve this issue." >> /tmp/prompt_$$.txt
            printf '%s\n' "For each file to create or modify, output a block in this EXACT format:" >> /tmp/prompt_$$.txt
            printf '%s\n' "=== FILE: path/to/file ===" >> /tmp/prompt_$$.txt
            printf '%s\n' "<complete new file contents>" >> /tmp/prompt_$$.txt
            printf '%s\n' "=== END FILE ===" >> /tmp/prompt_$$.txt
            printf '%s\n' "Rules: do not use path traversal (../ is forbidden). Write any file the fix requires." >> /tmp/prompt_$$.txt
            printf '%s\n' "Output ONLY file blocks. No prose outside blocks." >> /tmp/prompt_$$.txt

            # Call LLM with fallback chain
            AI_OUTPUT=""
            PROMPT_CONTENT=$(cat /tmp/prompt_$$.txt)
            rm -f /tmp/prompt_$$.txt
            while IFS= read -r model_entry; do
              [ -z "$model_entry" ] && continue
              MODEL=$(echo "$model_entry" | cut -d'|' -f1)
              ENDPOINT=$(echo "$model_entry" | cut -d'|' -f2)
              AUTH_KEY=$(echo "$model_entry" | cut -d'|' -f3)
              echo "  Trying model: $MODEL"
              PAYLOAD=$(jq -n \
                --arg model "$MODEL" \
                --arg content "$PROMPT_CONTENT" \
                '{model: $model, max_tokens: 8192, messages: [{role: "user", content: $content}]}')
              RESP=$(curl -sf --max-time 120 \
                -X POST "$ENDPOINT" \
                -H "Authorization: Bearer $AUTH_KEY" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" 2>&1) || true
              AI_OUTPUT=$(echo "$RESP" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
              if [ -n "$AI_OUTPUT" ]; then
                echo "  Model $MODEL succeeded"
                break
              fi
              echo "  Model $MODEL failed, trying next..."
            done <<< "$MODELS_CONFIG"

            if [ -z "$AI_OUTPUT" ]; then
              echo "All models failed for $REPO #$NUM, skipping"
              popd > /dev/null
              continue
            fi

            echo "$AI_OUTPUT" > /tmp/ai_output_$$.txt

            # Parse AI output and write files
            printf '%s\n' 'import sys, os, re' > /tmp/parse_ai_$$.py
            printf '%s\n' 'import argparse' >> /tmp/parse_ai_$$.py
            printf '%s\n' 'with open(sys.argv[1]) as f: content = f.read()' >> /tmp/parse_ai_$$.py
            printf '%s\n' 'pattern = r"=== FILE: (.+?) ===\n(.*?)=== END FILE ==="' >> /tmp/parse_ai_$$.py
            printf '%s\n' 'matches = re.findall(pattern, content, re.DOTALL)' >> /tmp/parse_ai_$$.py
            printf '%s\n' 'count = 0' >> /tmp/parse_ai_$$.py
            printf '%s\n' 'for path, body in matches:' >> /tmp/parse_ai_$$.py
            printf '%s\n' '    path = path.strip()' >> /tmp/parse_ai_$$.py
            printf '%s\n' '    if ".." in path.split("/"): continue' >> /tmp/parse_ai_$$.py
            printf '%s\n' '    if path.startswith("/"): continue' >> /tmp/parse_ai_$$.py
            printf '%s\n' '    dirpath = os.path.dirname(path)' >> /tmp/parse_ai_$$.py
            printf '%s\n' '    if dirpath: os.makedirs(dirpath, exist_ok=True)' >> /tmp/parse_ai_$$.py
            printf '%s\n' '    open(path, "w").write(body)' >> /tmp/parse_ai_$$.py
            printf '%s\n' '    print(f"Wrote: {path}", file=sys.stderr)' >> /tmp/parse_ai_$$.py
            printf '%s\n' '    count += 1' >> /tmp/parse_ai_$$.py
            printf '%s\n' 'print(count)' >> /tmp/parse_ai_$$.py

            FILES_WRITTEN=$(python3 /tmp/parse_ai_$$.py /tmp/ai_output_$$.txt)
            rm -f /tmp/parse_ai_$$.py /tmp/ai_output_$$.txt

            echo "  Files written: $FILES_WRITTEN"

            if [ "${FILES_WRITTEN:-0}" -eq 0 ] 2>/dev/null || [ -z "$FILES_WRITTEN" ]; then
              echo "  No file blocks produced for $REPO #$NUM, skipping PR"
              git checkout "$DEFAULT_BRANCH" 2>/dev/null || true
              popd > /dev/null
              continue
            fi

            BRANCH="fix/issue-${NUM}"
            git checkout -B "$BRANCH"
            git add -A

            if git diff --staged --quiet; then
              echo "  No staged changes for $REPO #$NUM"
              git checkout "$DEFAULT_BRANCH" 2>/dev/null || true
              popd > /dev/null
              continue
            fi

            SAFE_TITLE=$(echo "$ISSUE_TITLE" | head -c 60)
            git commit -m "fix: resolve issue #${NUM} - ${SAFE_TITLE}"
            git push origin "$BRANCH" --force-with-lease || true

            PR_URL=$(gh pr create \
              --repo "$REPO" \
              --title "fix: issue #${NUM} - ${SAFE_TITLE}" \
              --body "Closes #${NUM}

          AI-generated fix using Kilo Gateway free models." \
              --head "$BRANCH" \
              --base "$DEFAULT_BRANCH" 2>/dev/null || true)

            if [ -n "$PR_URL" ]; then
              gh issue comment "$NUM" --repo "$REPO" --body "🤖 AI fix submitted: $PR_URL — merges automatically when checks pass." || true
              gh issue edit "$NUM" --repo "$REPO" --add-label "ai-fix-pending" || true
              gh pr merge "$PR_URL" --auto --squash --delete-branch || true
            fi

            git checkout "$DEFAULT_BRANCH" 2>/dev/null || true
            popd > /dev/null
            echo "=== Done with $REPO #$NUM ==="

          done < <(echo "$BATCH" | jq -c '.[]')
