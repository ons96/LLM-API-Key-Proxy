name: Batch AI Issue Fixer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bot Setup
        id: setup
        uses: ./.github/actions/bot-setup
        with:
          bot-app-id: ${{ secrets.BOT_APP_ID }}
          bot-private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          opencode-model: ${{ secrets.OPENCODE_MODEL }}
          opencode-fast-model: ${{ secrets.OPENCODE_FAST_MODEL }}
          custom-providers-json: ${{ secrets.CUSTOM_PROVIDERS_JSON }}

      - name: Collect open issues
        id: issues
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
        run: |
          ISSUES_JSON=$(gh issue list --state open --json number,title,body --limit 50)
          echo "issues_json<<GH_ISSUES_DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$ISSUES_JSON" >> "$GITHUB_OUTPUT"
          echo "GH_ISSUES_DELIMITER" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$ISSUES_JSON" | jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT open issues"

      - name: Fix issues sequentially
        if: steps.issues.outputs.count != '0'
        env:
          GITHUB_TOKEN: ${{ steps.setup.outputs.token }}
          ISSUES_JSON: ${{ steps.issues.outputs.issues_json }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENCODE_PERMISSION: |
            {
              "bash": {
                "gh*": "allow",
                "git*": "allow",
                "jq*": "allow"
              },
              "external_directory": "allow",
              "webfetch": "deny"
            }
        run: |
          set -euo pipefail

          # Save the secure prompt from the checked-out base branch
          cp .github/prompts/batch-fix.md /tmp/batch-fix.md

          TOTAL=$(echo "$ISSUES_JSON" | jq 'length')
          echo "Processing $TOTAL issues..."

          for i in $(seq 0 $((TOTAL - 1))); do
            ISSUE_NUMBER=$(echo "$ISSUES_JSON" | jq -r ".[$i].number")
            ISSUE_TITLE=$(echo "$ISSUES_JSON" | jq -r ".[$i].title")
            ISSUE_BODY=$(echo "$ISSUES_JSON" | jq -r ".[$i].body // \"(No description provided)\"" | head -c 3000)

            echo "=========================================="
            echo "Processing issue #$ISSUE_NUMBER: $ISSUE_TITLE"
            echo "=========================================="

            # Skip if a fix branch or PR already exists for this issue
            EXISTING_PR=$(gh pr list --state open --json headRefName --jq ".[] | select(.headRefName == \"fix/issue-${ISSUE_NUMBER}\") | .headRefName" 2>/dev/null || true)
            EXISTING_BRANCH=$(git ls-remote --heads origin "fix/issue-${ISSUE_NUMBER}" 2>/dev/null | wc -l || echo "0")
            if [ -n "$EXISTING_PR" ] || [ "$EXISTING_BRANCH" -gt 0 ]; then
              echo "Skipping issue #$ISSUE_NUMBER — fix branch or PR already exists."
              continue
            fi

            # Reset to main before each issue to ensure clean starting state
            git fetch origin main --quiet
            git checkout main --quiet
            git reset --hard origin/main --quiet

            # Build the prompt by substituting variables
            ISSUE_NUMBER="$ISSUE_NUMBER" \
            ISSUE_TITLE="$ISSUE_TITLE" \
            ISSUE_BODY="$ISSUE_BODY" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
              envsubst '${ISSUE_NUMBER} ${ISSUE_TITLE} ${ISSUE_BODY} ${GITHUB_REPOSITORY}' \
              < /tmp/batch-fix.md \
              | opencode run --share - || {
                echo "::warning::opencode failed for issue #$ISSUE_NUMBER — skipping."
              }

            echo "Finished issue #$ISSUE_NUMBER"
          done

          echo "All issues processed."

      - name: No open issues
        if: steps.issues.outputs.count == '0'
        run: echo "No open issues found. Nothing to do."
