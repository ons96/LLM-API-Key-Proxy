name: Batch AI Issue Fixer

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect and fix issues
        run: |
          # Get list of open issues
          ISSUES=$(gh issue list --state open --json number --jq '[.[].number]')
          COUNT=$(echo "$ISSUES" | jq 'length')
          echo "Found $COUNT open issues"
          
          # Process each issue
          for issue_num in $(echo "$ISSUES" | jq -r '.[]'); do
            echo "Processing issue #$issue_num"
            
            # Build prompt
            cat > prompt.txt << EOF
            You are an expert software engineer.
            Fix GitHub issue #${issue_num} in this repository.
            Title: $(gh issue view "$issue_num" --json title --jq '.title')
            
            Description:
            $(gh issue view "$issue_num" --json body --jq '.body' | head -c 1500)
            
            Instructions:
            1. Identify the root cause.
            2. Implement the minimal correct fix.
            3. Write clean code.
            4. Explain what you changed and why.
            EOF
            
            # Call AI API (Kilo Kimi K2.5 free)
            PAYLOAD=$(python3 -c "
            import json
            with open('prompt.txt') as f: content = f.read()
            payload = {
                'model': 'moonshotai/kimi-k2.5:free',
                'max_tokens': 8192,
                'messages': [{'role': 'user', 'content': content}]
            }
            print(json.dumps(payload))
            ")
            
            RESP=$(curl -sf --max-time 180 \
              -X POST "https://api.kilo.ai/v1/chat/completions" \
              -H "Authorization: Bearer $KILOCODE_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD") || echo "API call failed"
            
            if [ -n "$RESP" ]; then
              echo "$RESP" | jq -r '.choices[0].message.content' > agent_output.txt
              
              # Create branch and PR
              BRANCH="fix/issue-${issue_num}"
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
              
              mkdir -p .github/agent-patches
              cp agent_output.txt ".github/agent-patches/issue-${issue_num}.md"
              
              git add -A
              if ! git diff --staged --quiet; then
                git commit -m "fix: AI agent patch for issue #${issue_num}" || true
                git push origin "$BRANCH" --force-with-lease || true
                
                # Create PR
                gh pr create --title "fix: resolve issue #${issue_num}" \
                  --body "Closes #${issue_num}" \
                  --head "$BRANCH" --base main || true
              fi
            fi
            
            echo "Finished issue #$issue_num"
          done
