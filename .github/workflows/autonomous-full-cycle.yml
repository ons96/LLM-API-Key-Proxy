name: Autonomous Agentic Coding - Full Cycle

on:
  workflow_dispatch:
    inputs:
      max_issues_per_repo:
        description: 'Max issues to fix per repo'
        required: false
        default: '20'
      scan_type:
        description: 'Type of issue scan'
        required: false
        default: 'full'
        type: choice
        options:
        - full
        - security
        - performance
        - documentation
        - code-quality
      merge_prs:
        description: 'Auto-merge ready PRs'
        required: false
        default: false
        type: boolean
      dry_run_prs:
        description: 'Dry run PR management'
        required: false
        default: true
        type: boolean

concurrency:
  group: autonomous-full-cycle
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull_requests: write
  actions: read

jobs:
  discover-repos:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.find.outputs.repos }}
      total: ${{ steps.find.outputs.total }}

    steps:
    - name: Discover all repositories
      id: find
      run: |
        REPOS=$(gh repo list ${{ github.repository_owner }} \
          --json name,open_issues_count \
          --jq '[.[] | select(.open_issues_count > 0 or true)]' \
          --limit 100)

        TOTAL=$(echo "$REPOS" | jq 'length')

        echo "repos=${REPOS}" >> $GITHUB_OUTPUT
        echo "total=${TOTAL}" >> $GITHUB_OUTPUT

        echo "## 📋 Discovered $TOTAL repositories" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "$REPOS" | jq -r '.[] | "- \(.name): \(.open_issues_count) open issues"' >> $GITHUB_STEP_SUMMARY
      env:
        GH_TOKEN: ${{ github.token }}

  generate-issues:
    needs: discover-repos
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover-repos.outputs.repos) }}

    steps:
    - name: Checkout ${{ matrix.repo.name }}
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/${{ matrix.repo.name }}
        fetch-depth: 0

    - name: Setup bot
      uses: ./.github/actions/bot-setup
      with:
        bot-app-id: ${{ secrets.BOT_APP_ID }}
        bot-private-key: ${{ secrets.BOT_PRIVATE_KEY }}
        opencode-api-key: ${{ secrets.KILOCODE_API_KEY }}
        opencode-model: ${{ secrets.OPENCODE_MODEL || 'kilocode/minimax-m2.5' }}
        opencode-fast-model: ${{ secrets.OPENCODE_FAST_MODEL || 'openrouter/qwen3-coder:free' }}
        custom-providers-json: ${{ secrets.CUSTOM_PROVIDERS_JSON || '{}' }}
      continue-on-error: true

    - name: Scan for issues
      id: scan
      run: |
        SCAN_TYPE="${{ github.event.inputs.scan_type }}"

        PROMPT="Scan this codebase for potential issues.

        Focus on:
        - Security vulnerabilities
        - Performance problems
        - Missing documentation
        - Code quality issues
        - Potential bugs

        Create GitHub issues for anything found that needs fixing.
        Use appropriate labels: bug, security, performance, documentation, etc.

        Scan type: $SCAN_TYPE"

        echo "$PROMPT" > /tmp/scan-prompt.md

        opencode --prompt "$(cat /tmp/scan-prompt.md)" \
          --non-interactive \
          --timeout 600 \
          2>&1 | tee /tmp/scan-output.log || true

        ISSUES_CREATED=$(grep -c "Created issue #" /tmp/scan-output.log 2>/dev/null || echo "0")
        echo "issues_created=${ISSUES_CREATED}" >> $GITHUB_OUTPUT
      timeout-minutes: 15
      continue-on-error: true

    - name: Report scan results
      run: |
        echo "### ${{ matrix.repo.name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Issues created: ${{ steps.scan.outputs.issues_created || '0' }}" >> $GITHUB_STEP_SUMMARY

  fix-issues:
    needs: [discover-repos, generate-issues]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover-repos.outputs.repos) }}

    steps:
    - name: Checkout ${{ matrix.repo.name }}
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/${{ matrix.repo.name }}
        fetch-depth: 0

    - name: Setup bot
      uses: ./.github/actions/bot-setup
      with:
        bot-app-id: ${{ secrets.BOT_APP_ID }}
        bot-private-key: ${{ secrets.BOT_PRIVATE_KEY }}
        opencode-api-key: ${{ secrets.KILOCODE_API_KEY }}
        opencode-model: ${{ secrets.OPENCODE_MODEL || 'kilocode/minimax-m2.5' }}
        opencode-fast-model: ${{ secrets.OPENCODE_FAST_MODEL || 'openrouter/qwen3-coder:free' }}
        custom-providers-json: ${{ secrets.CUSTOM_PROVIDERS_JSON || '{}' }}
      continue-on-error: true

    - name: Get open issues
      id: issues
      run: |
        MAX="${{ github.event.inputs.max_issues_per_repo }}"

        ISSUES=$(gh issue list \
          --repo ${{ github.repository_owner }}/${{ matrix.repo.name }} \
          --state open \
          --search "-label:wontfix -label:invalid -label:duplicate -label:in-progress" \
          --json number,title,body,labels \
          --limit "$MAX" \
          --jq '.')

        COUNT=$(echo "$ISSUES" | jq 'length')
        echo "issues=${ISSUES}" >> $GITHUB_OUTPUT
        echo "count=${COUNT}" >> $GITHUB_OUTPUT
        echo "Found $COUNT issues to fix"
      env:
        GH_TOKEN: ${{ steps.generate_token.outputs.token || github.token }}

    - name: Fix issues with OpenCode
      if: steps.issues.outputs.count > 0
      run: |
        ISSUES='${{ steps.issues.outputs.issues }}'

        for issue in $(echo "$ISSUES" | jq -c '.[]'); do
          NUMBER=$(echo "$issue" | jq -r '.number')
          TITLE=$(echo "$issue" | jq -r '.title')
          BODY=$(echo "$issue" | jq -r '.body')

          echo "Processing issue #$NUMBER: $TITLE"

          PROMPT="Fix this GitHub issue.

          Issue #$NUMBER: $TITLE

          $BODY

          Instructions:
          1. Create a feature branch: fix/issue-$NUMBER
          2. Implement the fix
          3. Write tests if applicable
          4. Commit with message: 'Fix #$NUMBER: $TITLE'
          5. Create a PR

          Do NOT use 'as any', '@ts-ignore', or suppress type errors.
          Do NOT delete failing tests.
          Follow existing code patterns."

          echo "$PROMPT" > /tmp/fix-prompt-$NUMBER.md

          opencode --prompt "$(cat /tmp/fix-prompt-$NUMBER.md)" \
            --non-interactive \
            --timeout 1800 \
            2>&1 | tee /tmp/fix-output-$NUMBER.log || true

          PR_URL=$(grep -o 'https://github.com.*pull/[0-9]*' /tmp/fix-output-$NUMBER.log 2>/dev/null | head -1 || echo "")

          if [ -n "$PR_URL" ]; then
            echo "Created PR: $PR_URL"
            gh issue comment "$NUMBER" --repo "${{ github.repository_owner }}/${{ matrix.repo.name }}" \
              --body "🔧 AI has created a fix: $PR_URL" || true
            gh issue edit "$NUMBER" --repo "${{ github.repository_owner }}/${{ matrix.repo.name }}" \
              --add-label "ai-generated" || true
          fi
        done
      timeout-minutes: 30
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Report fix results
      run: |
        echo "### ${{ matrix.repo.name }} Fixes" >> $GITHUB_STEP_SUMMARY
        echo "- Issues found: ${{ steps.issues.outputs.count }}" >> $GITHUB_STEP_SUMMARY

  manage-prs:
    needs: [discover-repos, fix-issues]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 20
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover-repos.outputs.repos) }}

    steps:
    - name: Checkout ${{ matrix.repo.name }}
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/${{ matrix.repo.name }}

    - name: Get open PRs
      id: prs
      run: |
        PRS=$(gh pr list \
          --repo ${{ github.repository_owner }}/${{ matrix.repo.name }} \
          --state open \
          --json number,title,mergeable,mergeable_state,draft,labels,updatedAt \
          --jq '.')

        echo "prs=${PRS}" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Merge ready PRs
      if: github.event.inputs.merge_prs == 'true'
      run: |
        DRY_RUN="${{ github.event.inputs.dry_run_prs }}"

        READY_PRS=$(echo '${{ steps.prs.outputs.prs }}' | jq \
          '[.[] | select(.mergeable == true and .mergeable_state == "clean" and .draft == false)]')

        for pr in $(echo "$READY_PRS" | jq -c '.[]'); do
          NUMBER=$(echo "$pr" | jq -r '.number')
          TITLE=$(echo "$pr" | jq -r '.title')

          if [ "$DRY_RUN" == "true" ]; then
            echo "[DRY RUN] Would merge PR #$NUMBER: $TITLE"
          else
            echo "Merging PR #$NUMBER: $TITLE"
            gh pr merge "$NUMBER" --repo "${{ github.repository_owner }}/${{ matrix.repo.name }}" \
              --squash --delete-branch || true
          fi
        done
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Close stale PRs
      run: |
        DRY_RUN="${{ github.event.inputs.dry_run_prs }}"

        STALE_PRS=$(echo '${{ steps.prs.outputs.prs }}' | jq \
          '[.[] | select(.labels[]?.name | IN("wontfix", "invalid", "outdated", "stale")) or (.updatedAt | fromdateiso8601 < (now - 2592000))]' \
          2>/dev/null || echo '[]')

        for pr in $(echo "$STALE_PRS" | jq -c '.[]'); do
          NUMBER=$(echo "$pr" | jq -r '.number')
          TITLE=$(echo "$pr" | jq -r '.title')

          if [ "$DRY_RUN" == "true" ]; then
            echo "[DRY RUN] Would close stale PR #$NUMBER: $TITLE"
          else
            echo "Closing stale PR #$NUMBER: $TITLE"
            gh pr close "$NUMBER" --repo "${{ github.repository_owner }}/${{ matrix.repo.name }}" \
              --comment "Auto-closed: stale or marked wontfix/invalid" || true
          fi
        done
      env:
        GH_TOKEN: ${{ github.token }}

  final-summary:
    needs: [discover-repos, generate-issues, fix-issues, manage-prs]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Generate final summary
      run: |
        echo "## 🎉 Autonomous Agentic Coding Cycle Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Processed:" >> $GITHUB_STEP_SUMMARY
        echo "- Repositories: ${{ needs.discover-repos.outputs.total }}" >> $GITHUB_STEP_SUMMARY
        echo "- Max parallel: 20" >> $GITHUB_STEP_SUMMARY
        echo "- Scan type: ${{ github.event.inputs.scan_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- Auto-merge PRs: ${{ github.event.inputs.merge_prs }}" >> $GITHUB_STEP_SUMMARY
        echo "- Dry run PRs: ${{ github.event.inputs.dry_run_prs }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Models Used:" >> $GITHUB_STEP_SUMMARY
        echo "- Primary: MiniMax M2.5 (80.2% SWE-Bench)" >> $GITHUB_STEP_SUMMARY
        echo "- Fallback: Kimi K2.5, Qwen3 Coder, DeepSeek V3" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ All repos have been scanned, issues generated, and fixes attempted." >> $GITHUB_STEP_SUMMARY
