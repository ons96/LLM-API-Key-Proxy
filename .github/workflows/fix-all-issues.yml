name: Fix All Issues

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  MAX_REPOS: 10
  MAX_ISSUES_PER_REPO: 5
  PRIMARY_MODEL: 'moonshotai/kimi-k2.5:free'
  FALLBACK_MODEL_1: 'stepfun/step-3.5-flash:free'
  FALLBACK_MODEL_2: 'minimax/minimax-m2.5:free'
  FALLBACK_MODEL_3: 'opencode/minimax-m2.5-free'
  FALLBACK_MODEL_4: 'z.ai/glm-4.7:free'
  FALLBACK_MODEL_5: 'arceeai/trinity-large-preview:free'
  KILO_API_URL: 'https://api.kilo.ai/v1/chat/completions'
  ZEN_API_URL: 'https://opencode.ai/zen/v1/chat/completions'

jobs:
  # ── Phase 1: produce a flat list of {repo, issue} pairs ──────────────────
  get-issues:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      total:  ${{ steps.build.outputs.total }}
    steps:
      - name: Build flat issue matrix
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          export GH_TOKEN
          python3 << 'PYEOF'
          import json, subprocess, os

          max_repos = int(os.environ.get('MAX_REPOS', '10'))
          max_per   = int(os.environ.get('MAX_ISSUES_PER_REPO', '5'))

          repos = json.loads(subprocess.run(
              ['gh', 'repo', 'list', '--limit', str(max_repos), '--json', 'nameWithOwner'],
              capture_output=True, text=True, env=dict(os.environ)
          ).stdout)

          entries = []
          for r in repos:
              repo = r['nameWithOwner']
              issues = json.loads(subprocess.run(
                  ['gh', 'issue', 'list', '--repo', repo, '--state', 'open', '--json', 'number'],
                  capture_output=True, text=True, env=dict(os.environ)
              ).stdout)
              for i in issues[:max_per]:
                  entries.append({'repo': repo, 'issue': i['number']})

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(entries)}\n")
              f.write(f"total={len(entries)}\n")
          print(f"Found {len(entries)} issue(s) across {len(repos)} repo(s)")
          PYEOF

  # ── Phase 2: one job per {repo, issue} pair ───────────────────────────────
  fix-issue:
    needs: get-issues
    if: needs.get-issues.outputs.total != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.get-issues.outputs.matrix) }}
    steps:
      - name: Checkout target repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          export GH_TOKEN
          gh repo clone "${{ matrix.repo }}" repo-to-fix -- --depth 1
          cd repo-to-fix
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get issue details
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export GH_TOKEN

          ISSUE_NUM="${{ matrix.issue }}"
          REPO="${{ matrix.repo }}"

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json title --jq '.title')
          ISSUE_BODY=$(gh issue view  "$ISSUE_NUM" --repo "$REPO" --json body  --jq '.body' | head -c 2000)

          {
            printf 'You are an expert software engineer. Fix GitHub issue #%s in this repository.\n\n' "$ISSUE_NUM"
            printf 'Issue Title: %s\n\n' "$ISSUE_TITLE"
            printf 'Issue Description:\n%s\n\n' "$ISSUE_BODY"
            printf 'Instructions:\n'
            printf '1. Analyze the codebase to understand the issue\n'
            printf '2. Identify the root cause\n'
            printf '3. Implement the minimal correct fix\n'
            printf '4. Write clean code\n'
            printf '5. Explain what you changed and why\n\n'
            printf 'Provide your fix as a detailed explanation with code changes.\n'
          } > /tmp/fix_prompt.txt

      - name: 'Try LLM: Kilo Kimi K2.5'
        id: llm_1
        continue-on-error: true
        env:
          KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY }}
        run: |
          PAYLOAD=$(jq -n --rawfile prompt /tmp/fix_prompt.txt --arg model '${{ env.PRIMARY_MODEL }}' '{model: $model, max_tokens: 8192, messages: [{role: "user", content: $prompt}]}')
          RESP=$(curl -sf --max-time 180 -X POST "${{ env.KILO_API_URL }}" \
            -H "Authorization: Bearer $KILOCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || exit 1
          echo "$RESP" | jq -r '.choices[0].message.content' > /tmp/fix_result.txt
          echo "RESULT_SOURCE=llm_1" >> $GITHUB_OUTPUT

      - name: 'Try LLM: Kilo Step 3.5 Flash'
        id: llm_2
        if: steps.llm_1.outcome == 'failure'
        continue-on-error: true
        env:
          KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY }}
        run: |
          PAYLOAD=$(jq -n --rawfile prompt /tmp/fix_prompt.txt --arg model '${{ env.FALLBACK_MODEL_1 }}' '{model: $model, max_tokens: 8192, messages: [{role: "user", content: $prompt}]}')
          RESP=$(curl -sf --max-time 180 -X POST "${{ env.KILO_API_URL }}" \
            -H "Authorization: Bearer $KILOCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || exit 1
          echo "$RESP" | jq -r '.choices[0].message.content' > /tmp/fix_result.txt
          echo "RESULT_SOURCE=llm_2" >> $GITHUB_OUTPUT

      - name: 'Try LLM: Kilo MiniMax M2.5'
        id: llm_3
        if: steps.llm_1.outcome == 'failure' && steps.llm_2.outcome == 'failure'
        continue-on-error: true
        env:
          KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY }}
        run: |
          PAYLOAD=$(jq -n --rawfile prompt /tmp/fix_prompt.txt --arg model '${{ env.FALLBACK_MODEL_2 }}' '{model: $model, max_tokens: 8192, messages: [{role: "user", content: $prompt}]}')
          RESP=$(curl -sf --max-time 180 -X POST "${{ env.KILO_API_URL }}" \
            -H "Authorization: Bearer $KILOCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || exit 1
          echo "$RESP" | jq -r '.choices[0].message.content' > /tmp/fix_result.txt
          echo "RESULT_SOURCE=llm_3" >> $GITHUB_OUTPUT

      - name: 'Try LLM: Zen MiniMax M2.5'
        id: llm_4
        if: >
          steps.llm_1.outcome == 'failure' &&
          steps.llm_2.outcome == 'failure' &&
          steps.llm_3.outcome == 'failure'
        continue-on-error: true
        env:
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
        run: |
          PAYLOAD=$(jq -n --rawfile prompt /tmp/fix_prompt.txt --arg model '${{ env.FALLBACK_MODEL_3 }}' '{model: $model, max_tokens: 8192, messages: [{role: "user", content: $prompt}]}')
          RESP=$(curl -sf --max-time 180 -X POST "${{ env.ZEN_API_URL }}" \
            -H "Authorization: Bearer $ZEN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || exit 1
          echo "$RESP" | jq -r '.choices[0].message.content' > /tmp/fix_result.txt
          echo "RESULT_SOURCE=llm_4" >> $GITHUB_OUTPUT

      - name: 'Try LLM: Kilo GLM 4.7'
        id: llm_5
        if: >
          steps.llm_1.outcome == 'failure' &&
          steps.llm_2.outcome == 'failure' &&
          steps.llm_3.outcome == 'failure' &&
          steps.llm_4.outcome == 'failure'
        continue-on-error: true
        env:
          KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY }}
        run: |
          PAYLOAD=$(jq -n --rawfile prompt /tmp/fix_prompt.txt --arg model '${{ env.FALLBACK_MODEL_4 }}' '{model: $model, max_tokens: 8192, messages: [{role: "user", content: $prompt}]}')
          RESP=$(curl -sf --max-time 180 -X POST "${{ env.KILO_API_URL }}" \
            -H "Authorization: Bearer $KILOCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || exit 1
          echo "$RESP" | jq -r '.choices[0].message.content' > /tmp/fix_result.txt
          echo "RESULT_SOURCE=llm_5" >> $GITHUB_OUTPUT

      - name: 'Try LLM: Kilo Trinity Large Preview'
        id: llm_6
        if: >
          steps.llm_1.outcome == 'failure' &&
          steps.llm_2.outcome == 'failure' &&
          steps.llm_3.outcome == 'failure' &&
          steps.llm_4.outcome == 'failure' &&
          steps.llm_5.outcome == 'failure'
        continue-on-error: true
        env:
          KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY }}
        run: |
          PAYLOAD=$(jq -n --rawfile prompt /tmp/fix_prompt.txt --arg model '${{ env.FALLBACK_MODEL_5 }}' '{model: $model, max_tokens: 8192, messages: [{role: "user", content: $prompt}]}')
          RESP=$(curl -sf --max-time 180 -X POST "${{ env.KILO_API_URL }}" \
            -H "Authorization: Bearer $KILOCODE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || exit 1
          echo "$RESP" | jq -r '.choices[0].message.content' > /tmp/fix_result.txt
          echo "RESULT_SOURCE=llm_6" >> $GITHUB_OUTPUT

      - name: Skip if all LLMs failed
        if: |
          steps.llm_1.outcome == 'failure' &&
          steps.llm_2.outcome == 'failure' &&
          steps.llm_3.outcome == 'failure' &&
          steps.llm_4.outcome == 'failure' &&
          steps.llm_5.outcome == 'failure' &&
          steps.llm_6.outcome == 'failure'
        run: echo "All LLMs failed for issue ${{ matrix.issue }} in ${{ matrix.repo }}. Skipping."

      - name: Create fix branch and PR
        if: |
          steps.llm_1.outcome == 'success' ||
          steps.llm_2.outcome == 'success' ||
          steps.llm_3.outcome == 'success' ||
          steps.llm_4.outcome == 'success' ||
          steps.llm_5.outcome == 'success' ||
          steps.llm_6.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export GH_TOKEN
          cd repo-to-fix

          ISSUE_NUM="${{ matrix.issue }}"
          REPO="${{ matrix.repo }}"
          BRANCH="fix/issue-${ISSUE_NUM}-$(date +%s)"

          mkdir -p .github/agent-patches
          cp /tmp/fix_result.txt ".github/agent-patches/issue-${ISSUE_NUM}.md"

          git checkout -b "$BRANCH"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit for issue #${ISSUE_NUM}"
            exit 0
          fi

          git commit -m "fix: AI agent patch for issue #${ISSUE_NUM}"
          git push origin "$BRANCH" --force-with-lease

          PR_BODY=$(mktemp)
          cat > "$PR_BODY" << EOPR
          ## Summary
          Auto-generated fix for issue #${ISSUE_NUM}

          See \`.github/agent-patches/issue-${ISSUE_NUM}.md\` for AI reasoning.
          EOPR

          gh pr create \
            --repo "$REPO" \
            --title "fix: resolve issue #${ISSUE_NUM}" \
            --body-file "$PR_BODY" \
            --head "$BRANCH" \
            --base main || true

          echo "Created fix PR for issue #${ISSUE_NUM} in ${REPO}"
