# Example nginx configuration for Mirro-Proxy Docker deployment
# Place this in your nginx configuration directory (e.g., /etc/nginx/conf.d/)

upstream mirro_proxy {
    server localhost:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;
    
    # Redirect HTTP to HTTPS in production
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://mirro_proxy;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts for long-running LLM requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffer settings for streaming responses
        proxy_buffering off;
        proxy_cache off;
        
        # WebSocket support (if needed for future features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://mirro_proxy/health;
        access_log off;
        allow all;
    }
}

