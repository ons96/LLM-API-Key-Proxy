# Docker-specific configuration overrides
# This file contains settings optimized for containerized deployments

# Server settings optimized for Docker networking
server:
  host: "0.0.0.0"  # Listen on all interfaces
  port: 8000
  workers: 1  # Use 1 worker per container (scale via Docker Compose/Swarm)
  
# Logging configuration for containerized environments
logging:
  level: "INFO"
  format: "json"  # JSON format for better integration with Docker logging drivers
  access_log: true
  
# Health check settings
health:
  enabled: true
  endpoint: "/health"
  interval: 30
  
# Request settings optimized for container resource limits
limits:
  max_request_size: "100MB"
  timeout: 300  # 5 minutes for long LLM requests
  
# Rate limiting (adjust based on container resources)
rate_limiting:
  enabled: true
  requests_per_minute: 60
  
# Provider failover settings for containerized environments
providers:
  retry_attempts: 3
  cooldown_period: 60
  health_check_interval: 300
