[run]
branch = True
source = 
    src/proxy_app
    src/rotator_library
omit = 
    */tests/*
    */test/*
    */__pycache__/*
    */venv/*
    */.venv/*
    */virtualenv/*
    */env/*
    */site-packages/*
    src/proxy_app/launcher_tui.py
    src/proxy_app/main.py
    src/rotator_library/fetch_artificial_analysis_data.py
    src/rotator_library/llm_aggregated_leaderboard.py
    */models_dev_discovery.py
    */live_scraper.py
    */background_refresher.py
    */build.py

[report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\(.*Exception\):
    except ImportError:
    pass
    # type: ignore
    @abstractmethod
    @abstract
    if TYPE_CHECKING:
    if typing.TYPE_CHECKING:
    ^\s*\.\.\.$
    ^\s*pragma: no cover$

precision = 2
show_missing = True
skip_covered = False
fail_under = 0

[html]
directory = htmlcov
title = Mirro-Proxy Test Coverage Report

[xml]
output = coverage.xml
