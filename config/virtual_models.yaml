# Global settings
free_only_mode: false

virtual_models:
  # =============================================================================
  # CODING ELITE (Best Agentic Coding - SWE-bench + LiveCodeBench weighted)
  # =============================================================================
  coding-elite:
    description: "Best agentic coding models (SWE-bench + LiveCodeBench weighted)"
    fallback_chain:
    # Tier 1: S-Tier Agentic Coding (70%+ SWE-bench)
    - provider: g4f-hosted
      model: claude-opus-4-5
      priority: 1
      reasoning_effort: high
    - provider: g4f-hosted
      model: claude-opus-4-6
      priority: 2
      reasoning_effort: high
    - provider: g4f-hosted
      model: claude-sonnet-4-5
      priority: 3
      reasoning_effort: high
    - provider: g4f-gemini
      model: gemini-3-flash
      priority: 4
      reasoning_effort: high
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 5
      reasoning_effort: high
    - provider: g4f-hosted
      model: gpt-5-2
      priority: 6
      reasoning_effort: high
    - provider: g4f-hosted
      model: minimax-m2-5
      priority: 7
      reasoning_effort: high
    # Tier 2: A-Tier Agentic Coding (60-70% SWE-bench)
    - provider: g4f-hosted
      model: kimi-k2-5
      priority: 8
      reasoning_effort: high
    - provider: together
      model: deepseek-chat
      priority: 9
      reasoning_effort: high
    - provider: g4f-hosted
      model: claude-opus-4
      priority: 10
    - provider: g4f-hosted
      model: gpt-5-2-codex
      priority: 11
    - provider: g4f-hosted
      model: claude-haiku-4-5
      priority: 12
      reasoning_effort: high
    # Tier 3: Fast fallbacks
    - provider: g4f-groq
      model: llama-4-maverick-17b-128e-instruct
      priority: 13
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 14
    settings:
      timeout_ms: 180000
      retry_on_rate_limit: true

  # =============================================================================
  # CODING SMART (High-quality coding with balanced performance)
  # =============================================================================
  coding-smart:
    description: "High-quality coding with balanced performance"
    fallback_chain:
    - provider: g4f-gemini
      model: gemini-3-flash
      priority: 1
      reasoning_effort: high
    - provider: g4f-hosted
      model: claude-opus-4-5
      priority: 2
      reasoning_effort: high
    - provider: g4f-hosted
      model: claude-opus-4-6
      priority: 3
    - provider: g4f-hosted
      model: minimax-m2-5
      priority: 4
      reasoning_effort: high
    - provider: g4f-hosted
      model: gpt-5-2
      priority: 5
      reasoning_effort: high
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 6
    - provider: g4f-hosted
      model: claude-sonnet-4-5
      priority: 7
      reasoning_effort: high
    - provider: together
      model: deepseek-chat
      priority: 8
      reasoning_effort: high
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 9
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  # =============================================================================
  # CODING FAST (Fastest coding models - TPS priority with quality floor)
  # =============================================================================
  coding-fast:
    description: "Fastest coding models (TPS priority with quality floor)"
    fallback_chain:
    - provider: g4f-groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 2
    - provider: g4f-groq
      model: llama-4-maverick-17b-128e-instruct
      priority: 3
    - provider: g4f-gemini
      model: gemini-3-flash
      priority: 4
      reasoning_effort: high
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 5
    - provider: g4f-pollinations
      model: deepseek
      priority: 6
    - provider: g4f-pollinations
      model: qwen-coder
      priority: 7
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

  # =============================================================================
  # CHAT SMART (Best intelligence-to-speed ratio)
  # =============================================================================
  chat-smart:
    description: "Best intelligence-to-speed ratio"
    fallback_chain:
