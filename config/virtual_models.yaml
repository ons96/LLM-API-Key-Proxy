virtual_models:
  coding-elite:
    description: Best agentic coding models (Claude 4.5/4.6, Gemini 3, GPT-5)
    fallback_chain:
    - provider: g4f
      model: claude-opus-4-6
      priority: 1
      role: expert
    - provider: g4f
      model: claude-opus-4-5
      priority: 2
      role: expert
    - provider: gemini
      model: gemini-3-pro
      priority: 3
      role: expert
    - provider: g4f
      model: gpt-5-2
      priority: 4
      role: expert
    - provider: cerebras
      model: glm-5
      priority: 5
      role: expert
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 6
      role: expert
    - provider: g4f-ollama
      model: gemini-3-flash-preview
      priority: 7
      role: expert
    - provider: g4f-ollama
      model: qwen3-coder-next
      priority: 8
      role: expert
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 6
    - provider: together
      model: deepseek-chat
      priority: 7
    settings:
      timeout_ms: 180000
      retry_on_rate_limit: true

  coding-elite-moe:
    description: Merge of Experts for Elite Coding
    moe_mode: true
    max_experts: 3
    aggregator_model: gemini/gemini-1.5-pro
    fallback_chain:
    - provider: g4f
      model: claude-opus-4-6
      priority: 1
      role: expert
    - provider: gemini
      model: gemini-3-pro
      priority: 2
      role: expert
    - provider: g4f
      model: gpt-5-2
      priority: 3
      role: expert
    - provider: cerebras
      model: glm-5
      priority: 4
      role: expert
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 5
      role: expert
    - provider: g4f-ollama
      model: gemini-3-flash-preview
      priority: 6
      role: expert
    - provider: g4f-ollama
      model: qwen3-coder-next
      priority: 7
      role: expert
    settings:
      timeout_ms: 300000

  coding-smart:
    description: High-quality coding with balanced performance
    fallback_chain:
    - provider: gemini
      model: gemini-3-pro
      priority: 1
    - provider: g4f
      model: claude-opus-4-5
      priority: 2
    - provider: g4f
      model: gpt-5-2
      priority: 3
    - provider: gemini
      model: gemini-3-flash
      priority: 4
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  coding-fast:
    description: Fastest coding models (TPS priority)
    fallback_chain:
    - provider: cerebras
      model: llama-3.3-70b
      priority: 1
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 2
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 3
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

  chat-smart:
    description: Best intelligence-to-speed ratio
    fallback_chain:
    - provider: gemini
      model: gemini-3-pro
      priority: 1
    - provider: g4f
      model: gpt-5-xhigh
      priority: 2
    - provider: together
      model: deepseek-v3
      priority: 3
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  chat-elite:
    description: Most intelligent models regardless of speed
    fallback_chain:
    - provider: gemini
      model: gemini-3-pro
      priority: 1
    - provider: g4f
      model: claude-opus-4-5-thinking-32k
      priority: 2
    - provider: g4f
      model: gpt-5-xhigh
      priority: 3
    settings:
      timeout_ms: 300000
      retry_on_rate_limit: true

  chat-fast:
    description: Fastest models that work well
    fallback_chain:
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 1
    - provider: g4f-groq
      model: llama-3.1-8b-instant
      priority: 2
    - provider: together
      model: deepseek-v3
      priority: 3
    settings:
      timeout_ms: 15000
      retry_on_rate_limit: true

  chat-rp:
    description: Roleplay models
    fallback_chain:
    - provider: g4f
      model: mn-violet-lotus-12b
      priority: 1
    - provider: g4f
      model: cydonia-24b-v4.1
      priority: 2
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

providers:
  nvidia:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
    rate_limits:
      rpm: 60
  together:
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    rate_limits:
      rpm: 60
  cerebras:
    base_url: https://api.cerebras.ai/v1
    api_key_env: CEREBRAS_API_KEY
    rate_limits:
      rpm: 50
      daily: 5000
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    rate_limits:
      rpm: 30
      daily: 14400
  google:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    rate_limits:
      rpm: 3000
  mistral:
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY
    rate_limits:
      rpm: 10
  g4f:
    base_url: https://g4f.dev/v1
    api_key_env: G4F_API_KEY
    rate_limits:
      rpm: 10
      daily: 100
  g4f-groq:
    base_url: https://g4f.space/api/groq
    api_key_env: None
  g4f-ollama:
    base_url: https://g4f.space/api/ollama
    api_key_env: None
  g4f-pollinations:
    base_url: https://g4f.space/api/pollinations
    api_key_env: None
  g4f-nvidia:
    base_url: https://g4f.space/api/nvidia
    api_key_env: None
  g4f-gemini:
    base_url: https://g4f.space/api/gemini
    api_key_env: None
