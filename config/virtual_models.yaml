# Global settings
free_only_mode: false

virtual_models:
  # =============================================================================
  # CODING ELITE (Best Agentic Coding - SWE-bench + LiveCodeBench weighted)
  # =============================================================================
  coding-elite:
    description: "Best agentic coding models"
    fallback_chain:
    # Tier 1: S-Tier via g4f.space (free)
    - provider: g4f-gemini
      model: gemini-3-flash
      priority: 1
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 2
    - provider: g4f-groq
      model: llama-4-maverick-17b-128e-instruct
      priority: 3
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 4
    - provider: g4f-pollinations
      model: deepseek
      priority: 5
    - provider: g4f-pollinations
      model: glm
      priority: 6
    # Tier 2: Direct API fallbacks
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 7
    - provider: gemini
      model: gemini-2.5-flash
      priority: 8
    settings:
      timeout_ms: 180000
      retry_on_rate_limit: true

  coding-smart:
    description: "High-quality coding with balanced performance"
    fallback_chain:
    - provider: g4f-gemini
      model: gemini-3-flash
      priority: 1
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 2
    - provider: g4f-pollinations
      model: deepseek
      priority: 3
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 4
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  coding-fast:
    description: "Fastest coding models"
    fallback_chain:
    - provider: g4f-groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 2
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 3
    - provider: g4f-pollinations
      model: qwen-coder
      priority: 4
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

  chat-smart:
    description: "Best intelligence-to-speed ratio"
    fallback_chain:
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 1
    - provider: g4f-gemini
      model: gemini-3-flash
      priority: 2
    - provider: g4f-groq
      model: llama-4-scout
      priority: 3
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 4
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  chat-elite:
    description: "Most intelligent models"
    fallback_chain:
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 1
    - provider: g4f-gemini
      model: gemini-3-flash
      priority: 2
    - provider: g4f-groq
      model: llama-4-maverick-17b-128e-instruct
      priority: 3
    - provider: g4f-pollinations
      model: claude
      priority: 4
    settings:
      timeout_ms: 300000
      retry_on_rate_limit: true

  chat-fast:
    description: "Fastest models"
    fallback_chain:
    - provider: g4f-groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 2
    - provider: g4f-pollinations
      model: nova-fast
      priority: 3
    settings:
      timeout_ms: 15000
      retry_on_rate_limit: true

  chat-rp:
    description: "Roleplay models"
    fallback_chain:
    - provider: g4f-groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: g4f-pollinations
      model: kimi
      priority: 2
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

providers:
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
  together:
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
  g4f-groq:
    base_url: https://g4f.space/api/groq
    free_tier_only: true
  g4f-ollama:
    base_url: https://g4f.space/api/ollama
    free_tier_only: true
  g4f-pollinations:
    base_url: https://g4f.space/api/pollinations
    free_tier_only: true
  g4f-nvidia:
    base_url: https://g4f.space/api/nvidia
    free_tier_only: true
  g4f-gemini:
    base_url: https://g4f.space/api/gemini
    free_tier_only: true
