virtual_models:
  _global_settings:
    free_only_mode: false

  coding-elite:
    description: Best agentic coding models - REAL working models from g4f.space
    fallback_chain:
    # g4f.space Groq (free, best for coding)
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 1
    - provider: g4f-groq
      model: llama-4-maverick-17b-128e-instruct
      priority: 2
    - provider: g4f-groq
      model: llama-4-scout-17b-16e-instruct
      priority: 3
    # g4f.space Gemini (free)
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 4
    - provider: g4f-gemini
      model: gemini-2.5-pro
      priority: 5
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 6
    # g4f.space Nvidia (free, deepseek models)
    - provider: g4f-nvidia
      model: deepseek-ai/deepseek-r1-distill-llama-8b
      priority: 7
    - provider: g4f-nvidia
      model: deepseek-ai/deepseek-coder-6.7b-instruct
      priority: 8
    # g4f.space Pollinations (free)
    - provider: g4f-pollinations
      model: deepseek
      priority: 9
    - provider: g4f-pollinations
      model: glm
      priority: 10
    settings:
      timeout_ms: 180000
      retry_on_rate_limit: true

  coding-smart:
    description: High-quality coding with balanced performance
    fallback_chain:
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 1
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 2
    - provider: g4f-nvidia
      model: deepseek-ai/deepseek-r1-distill-qwen-14b
      priority: 3
    - provider: g4f-pollinations
      model: deepseek
      priority: 4
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  coding-fast:
    description: Fastest coding models (TPS priority)
    fallback_chain:
    - provider: g4f-groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 2
    - provider: g4f-pollinations
      model: qwen-coder
      priority: 3
    - provider: g4f-pollinations
      model: claude-fast
      priority: 4
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

  chat-smart:
    description: Best intelligence-to-speed ratio
    fallback_chain:
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 1
    - provider: g4f-gemini
      model: gemini-2.5-pro
      priority: 2
    - provider: g4f-groq
      model: llama-4-maverick-17b-128e-instruct
      priority: 3
    - provider: g4f-groq
      model: llama-3.3-70b-versatile
      priority: 4
    - provider: g4f-pollinations
      model: claude
      priority: 5
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  chat-elite:
    description: Most intelligent models regardless of speed
    fallback_chain:
    - provider: g4f-gemini
      model: gemini-3-pro
      priority: 1
    - provider: g4f-gemini
      model: gemini-2.5-pro
      priority: 2
    - provider: g4f-groq
      model: llama-4-maverick-17b-128e-instruct
      priority: 3
    - provider: g4f-pollinations
      model: claude
      priority: 4
    settings:
      timeout_ms: 300000
      retry_on_rate_limit: true

  chat-fast:
    description: Fastest models that work well
    fallback_chain:
    - provider: g4f-groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: g4f-gemini
      model: gemini-2.5-flash
      priority: 2
    - provider: g4f-pollinations
      model: nova-fast
      priority: 3
    - provider: g4f-pollinations
      model: perplexity-fast
      priority: 4
    settings:
      timeout_ms: 15000
      retry_on_rate_limit: true

  chat-rp:
    description: Roleplay models
    fallback_chain:
    - provider: g4f-groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: g4f-groq
      model: kimi-k2-instruct
      priority: 2
    - provider: g4f-pollinations
      model: kimi
      priority: 3
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

  # =============================================================================
  # MERGE OF EXPERTS (MoE) - Multi-LLM with Judge
  # =============================================================================
  coding-moe:
    description: Merge of Experts - Multiple LLMs with judge evaluation
    moe_mode: true
    max_experts: 3
    aggregator_model: groq/llama-3.3-70b-versatile
    fallback_chain:
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 1
    - provider: gemini
      model: gemini-1.5-flash
      priority: 2
    - provider: openai
      model: gpt-4o-mini
      priority: 3
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  chat-moe:
    description: Merge of Experts for chat
    moe_mode: true
    max_experts: 2
    aggregator_model: groq/llama-3.1-8b-instant
    fallback_chain:
    - provider: groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: gemini
      model: gemini-1.5-flash
      priority: 2
    settings:
      timeout_ms: 60000
      retry_on_rate_limit: true

providers:
  # Direct API providers
  nvidia:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
    rate_limits:
      rpm: 60
  together:
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    rate_limits:
      rpm: 60
  cerebras:
    base_url: https://api.cerebras.ai/v1
    api_key_env: CEREBRAS_API_KEY
    rate_limits:
      rpm: 50
      daily: 5000
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    rate_limits:
      rpm: 30
      daily: 14400
  google:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    rate_limits:
      rpm: 3000
  mistral:
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY
    rate_limits:
      rpm: 10
  
  # G4F Free providers (no API key needed)
  g4f-groq:
    base_url: https://g4f.space/api/groq
  g4f-ollama:
    base_url: https://g4f.space/api/ollama
  g4f-pollinations:
    base_url: https://g4f.space/api/pollinations
  g4f-nvidia:
    base_url: https://g4f.space/api/nvidia
  g4f-gemini:
    base_url: https://g4f.space/api/gemini
  
  # G4F hosted (requires API key - rate limits unknown)
  g4f-hosted:
    base_url: https://g4f.space/v1
    api_key_env: G4F_API_KEY
