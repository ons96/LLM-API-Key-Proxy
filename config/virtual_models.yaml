```yaml
# Virtual Models Configuration
# This file defines virtual models that map to actual provider models

virtual_models:
  chat-fast:
    description: "Fast chat model optimized for low latency"
    preferred_provider: "groq"
    fallback_providers:
      - "cerebras"
      - "fireworks"
    model_mapping:
      groq: "llama-3.3-70b-versatile"
      cerebras: "llama-3.3-70b-versatile"
      fireworks: "fireworks-ai/llama-3.3-70b-instruct"
    settings:
      temperature: 0.3
      max_tokens: 4096
      timeout: 30

  chat-balanced:
    description: "Balanced chat model for general use"
    preferred_provider: "openai"
    fallback_providers:
      - "anthropic"
      - "gemini"
    model_mapping:
      openai: "gpt-4o-mini"
      anthropic: "claude-3-haiku-20240307"
      gemini: "gemini-1.5-flash"
    settings:
      temperature: 0.7
      max_tokens: 4096

  chat-reasoning:
    description: "Advanced reasoning model"
    preferred_provider: "openai"
    fallback_providers:
      - "anthropic"
    model_mapping:
      openai: "gpt-4o"
      anthropic: "claude-3-opus-20240229"
    settings:
      temperature: 0.5
      max_tokens: 8192

  embedding-fast:
    description: "Fast embedding model"
    provider: "openai"
    model_mapping:
      openai: "text-embedding-3-small"
    dimensions: 1536

  embedding-quality:
    description: "Quality embedding model"
    provider: "openai"
    model_mapping:
      openai: "text-embedding-3-large"
    dimensions: 3072
```
