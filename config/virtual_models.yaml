providers:
  nvidia:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
    rate_limits:
      rpm: 60
  together:
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    rate_limits:
      rpm: 60
  cerebras:
    base_url: https://api.cerebras.ai/v1
    api_key_env: CEREBRAS_API_KEY
    rate_limits:
      rpm: 50
      daily: 5000
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    rate_limits:
      rpm: 30
      daily: 14400
  google:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    rate_limits:
      rpm: 3000
  mistral:
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY
    rate_limits:
      rpm: 10
  g4f-groq:
    base_url: https://g4f.space/api/groq
    free_tier_only: true
  g4f-ollama:
    base_url: https://g4f.space/api/ollama
    free_tier_only: true
  g4f-pollinations:
    base_url: https://g4f.space/api/pollinations
    free_tier_only: true
  g4f-nvidia:
    base_url: https://g4f.space/api/nvidia
    free_tier_only: true
  g4f-gemini:
    base_url: https://g4f.space/api/gemini
    free_tier_only: true
  g4f-hosted:
    base_url: https://g4f.space/v1
    api_key_env: G4F_API_KEY
