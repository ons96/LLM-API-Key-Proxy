virtual_models:
  coding-elite:
    description: Best agentic coding models (known working)
    fallback_chain:
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 1
    - provider: groq
      model: llama-3.1-70b-versatile
      priority: 2
    - provider: groq
      model: llama-3.1-8b-instant
      priority: 3
    - provider: gemini
      model: gemini-1.5-pro
      priority: 4
    - provider: gemini
      model: gemini-1.5-flash
      priority: 5
    - provider: openai
      model: gpt-4o
      priority: 6
    - provider: openai
      model: gpt-4o-mini
      priority: 7
    - provider: together
      model: deepseek-ai/DeepSeek-V3
      priority: 8
    settings:
      timeout_ms: 180000
      retry_on_rate_limit: true

  coding-smart:
    description: High-quality coding with balanced performance
    fallback_chain:
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 1
    - provider: gemini
      model: gemini-1.5-flash
      priority: 2
    - provider: openai
      model: gpt-4o-mini
      priority: 3
    - provider: together
      model: deepseek-ai/DeepSeek-V3
      priority: 4
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  coding-fast:
    description: Fastest coding models (TPS priority)
    fallback_chain:
    - provider: groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: groq
      model: llama-3-8b-instant
      priority: 2
    - provider: gemini
      model: gemini-1.5-flash
      priority: 3
    - provider: openai
      model: gpt-4o-mini
      priority: 4
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

  chat-smart:
    description: Best intelligence-to-speed ratio
    fallback_chain:
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 1
    - provider: gemini
      model: gemini-1.5-pro
      priority: 2
    - provider: openai
      model: gpt-4o
      priority: 3
    - provider: together
      model: deepseek-ai/DeepSeek-V3
      priority: 4
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  chat-elite:
    description: Most intelligent models regardless of speed
    fallback_chain:
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 1
    - provider: gemini
      model: gemini-1.5-pro
      priority: 2
    - provider: openai
      model: gpt-4o
      priority: 3
    - provider: together
      model: deepseek-ai/DeepSeek-V3
      priority: 4
    settings:
      timeout_ms: 300000
      retry_on_rate_limit: true

  chat-fast:
    description: Fastest models that work well
    fallback_chain:
    - provider: groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: gemini
      model: gemini-1.5-flash
      priority: 2
    - provider: openai
      model: gpt-4o-mini
      priority: 3
    settings:
      timeout_ms: 15000
      retry_on_rate_limit: true

  chat-rp:
    description: Roleplay models
    fallback_chain:
    - provider: groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: groq
      model: llama-3-8b-instant
      priority: 2
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

  # =============================================================================
  # MERGE OF EXPERTS (MoE) - Multi-LLM with Judge
  # =============================================================================
  coding-moe:
    description: Merge of Experts - Multiple LLMs with judge evaluation
    moe_mode: true
    max_experts: 3
    aggregator_model: groq/llama-3.3-70b-versatile
    fallback_chain:
    # Expert 1: Best coding model
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 1
      role: expert
    # Expert 2: Fast but smart
    - provider: gemini
      model: gemini-1.5-pro
      priority: 2
      role: expert
    # Expert 3: Alternative
    - provider: openai
      model: gpt-4o
      priority: 3
      role: expert
    # Expert 4: Fallback
    - provider: together
      model: deepseek-ai/DeepSeek-V3
      priority: 4
      role: expert
    settings:
      timeout_ms: 300000
      retry_on_rate_limit: true

  chat-moe:
    description: Merge of Experts for chat - Multiple LLMs with judge evaluation
    moe_mode: true
    max_experts: 3
    aggregator_model: groq/llama-3.3-70b-versatile
    fallback_chain:
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 1
      role: expert
    - provider: gemini
      model: gemini-1.5-pro
      priority: 2
      role: expert
    - provider: openai
      model: gpt-4o
      priority: 3
      role: expert
    - provider: together
      model: deepseek-ai/DeepSeek-V3
      priority: 4
      role: expert
    settings:
      timeout_ms: 300000
      retry_on_rate_limit: true

providers:
  nvidia:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
    rate_limits:
      rpm: 60
  together:
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    rate_limits:
      rpm: 60
  cerebras:
    base_url: https://api.cerebras.ai/v1
    api_key_env: CEREBRAS_API_KEY
    rate_limits:
      rpm: 50
      daily: 5000
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    rate_limits:
      rpm: 30
      daily: 14400
  google:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    rate_limits:
      rpm: 3000
  mistral:
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY
    rate_limits:
      rpm: 10
  g4f:
    base_url: https://g4f.dev/v1
    api_key_env: G4F_API_KEY
    rate_limits:
      rpm: 10
      daily: 100
  g4f-groq:
    base_url: https://g4f.space/api/groq
    api_key_env: None
  g4f-ollama:
    base_url: https://g4f.space/api/ollama
    api_key_env: None
  g4f-pollinations:
    base_url: https://g4f.space/api/pollinations
    api_key_env: None
  g4f-nvidia:
    base_url: https://g4f.space/api/nvidia
    api_key_env: None
  g4f-gemini:
    base_url: https://g4f.space/api/gemini
    api_key_env: None
