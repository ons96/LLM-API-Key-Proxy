# Global settings
free_only_mode: false

virtual_models:
  # =============================================================================
  # CODING ELITE (Best Agentic Coding - benchmark-based ordering)
  # =============================================================================
  coding-elite:
    description: "Best agentic coding models (benchmark-based)"
    fallback_chain:
    # Tier 1: Best via g4f (free, uses g4f library)
    - provider: g4f
      model: claude-opus-4-5
      priority: 1
    - provider: g4f
      model: claude-opus-4-6
      priority: 2
    - provider: g4f
      model: claude-sonnet-4-5
      priority: 3
    - provider: g4f
      model: gpt-5-2
      priority: 4
    - provider: g4f
      model: gemini-3-flash
      priority: 5
    - provider: g4f
      model: minimax-m2-5
      priority: 6
    # Tier 2: Direct API fallbacks
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 7
    - provider: gemini
      model: gemini-2.5-flash
      priority: 8
    - provider: together
      model: deepseek-chat
      priority: 9
    settings:
      timeout_ms: 180000
      retry_on_rate_limit: true

  coding-smart:
    description: "High-quality coding with balanced performance"
    fallback_chain:
    - provider: g4f
      model: gemini-3-flash
      priority: 1
    - provider: g4f
      model: claude-opus-4-5
      priority: 2
    - provider: g4f
      model: gpt-5-2
      priority: 3
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 4
    - provider: together
      model: deepseek-chat
      priority: 5
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  coding-fast:
    description: "Fastest coding models"
    fallback_chain:
    - provider: groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 2
    - provider: g4f
      model: gemini-2.5-flash
      priority: 3
    - provider: gemini
      model: gemini-2.5-flash
      priority: 4
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

  chat-smart:
    description: "Best intelligence-to-speed ratio"
    fallback_chain:
    - provider: g4f
      model: gemini-3-pro
      priority: 1
    - provider: g4f
      model: gemini-3-flash
      priority: 2
    - provider: g4f
      model: gpt-5-xhigh
      priority: 3
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 4
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true

  chat-elite:
    description: "Most intelligent models"
    fallback_chain:
    - provider: g4f
      model: gemini-3-pro
      priority: 1
    - provider: g4f
      model: claude-opus-4-5-thinking-32k
      priority: 2
    - provider: g4f
      model: gpt-5-xhigh
      priority: 3
    - provider: g4f
      model: gemini-3-flash
      priority: 4
    settings:
      timeout_ms: 300000
      retry_on_rate_limit: true

  chat-fast:
    description: "Fastest models"
    fallback_chain:
    - provider: groq
      model: llama-3.1-8b-instant
      priority: 1
    - provider: gemini
      model: gemini-2.5-flash
      priority: 2
    - provider: groq
      model: llama-3.3-70b-versatile
      priority: 3
    settings:
      timeout_ms: 15000
      retry_on_rate_limit: true

  chat-rp:
    description: "Roleplay models"
    fallback_chain:
    - provider: g4f
      model: mn-violet-lotus-12b
      priority: 1
    - provider: g4f
      model: cydonia-24b-v4.1
      priority: 2
    - provider: groq
      model: llama-3.1-8b-instant
      priority: 3
    settings:
      timeout_ms: 30000
      retry_on_rate_limit: true

providers:
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    rate_limits:
      rpm: 30
      daily: 14400
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    rate_limits:
      rpm: 15
      daily: 1500
  together:
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    rate_limits:
      rpm: 60
  g4f:
    base_url: https://g4f.space/v1
    api_key_env: G4F_API_KEY
    rate_limits:
      rpm: 10
