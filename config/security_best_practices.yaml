# Security Configuration Examples for Mirro-Proxy
# Copy relevant sections to your router_config.yaml or use as reference

# ============================================================================
# 1. AUTHENTICATION & ACCESS CONTROL
# ============================================================================

security:
  # Require API key for all endpoints including health checks
  require_auth_for_health: true
  
  # IP-based access control (if supported by your deployment)
  allowed_ips:
    - "127.0.0.1"
    - "10.0.0.0/8"  # Internal network only
  
  # API Key validation settings
  api_key:
    min_length: 32
    reject_weak_keys: true
    # Header name for API key (default: Authorization)
    header_name: "Authorization"
    prefix: "Bearer "  # Require "Bearer " prefix

# ============================================================================
# 2. RATE LIMITING & ABUSE PREVENTION
# ============================================================================

rate_limiting:
  # Global rate limits per client IP
  global:
    requests_per_minute: 60
    requests_per_hour: 1000
    burst_size: 10
  
  # Per-model rate limits (prevents expensive model abuse)
  per_model:
    "gpt-4":
      requests_per_minute: 10
      tokens_per_day: 100000
    "claude-3-opus":
      requests_per_minute: 5
  
  # Cost-based limits (requires provider cost tracking)
  cost_limits:
    daily_usd_limit: 100.0
    monthly_usd_limit: 1000.0
    alert_threshold_percent: 80

# ============================================================================
# 3. LOGGING & PRIVACY
# ============================================================================

logging:
  # Never log these headers (case-insensitive)
  redact_headers:
    - "authorization"
    - "x-api-key"
    - "cookie"
    - "proxy-authorization"
  
  # Content filtering
  mask_pii: true
  # Don't log request/response bodies (may contain sensitive data)
  log_request_bodies: false
  log_response_bodies: false
  
  # Retention
  max_log_age_days: 7
  max_log_size_mb: 100
  
  # Audit logging (separate from application logs)
  audit_log:
    enabled: true
    path: "/var/log/mirro-proxy/audit.log"
    events:
      - "authentication_failure"
      - "credential_rotation"
      - "configuration_change"

# ============================================================================
# 4. PROVIDER SECURITY
# ============================================================================

provider_security:
  # Automatic key rotation settings
  rotation:
    enabled: true
    check_interval_hours: 24
    max_key_age_days: 90
    rotate_on_failure_count: 3
  
  # Circuit breaker settings (prevents burning through credits on errors)
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout_seconds: 60
    half_open_max_calls: 1
  
  # Provider-specific restrictions
  allowed_models_per_provider:
    openai:
      - "gpt-3.5-turbo"
      - "gpt-4"
      # Explicitly deny expensive models if needed
    anthropic:
      - "claude-3-haiku"
      - "claude-3-sonnet"
  
  # Block list for compromised or unwanted providers
  blocked_providers: []

# ============================================================================
# 5. CORS & NETWORK SECURITY
# ============================================================================

cors:
  # STRICT PRODUCTION SETTING: Only allow specific origins
  allowed_origins:
    - "https://app.yourdomain.com"
    - "https://admin.yourdomain.com"
  
  # Development only - remove in production
  # allowed_origins: ["*"]  # NEVER USE IN PRODUCTION
  
  allowed_methods: ["GET", "POST"]
  allowed_headers: ["authorization", "content-type", "x-request-id"]
  allow_credentials: true
  max_age: 600

# ============================================================================
# 6. REQUEST VALIDATION
# ============================================================================

validation:
  # Maximum request size (prevent DoS via large payloads)
  max_request_size_mb: 10
  
  # Input sanitization
  block_html_injection: true
  allowed_content_types:
    - "application/json"
    - "text/plain"
  
  # Prompt injection detection (basic)
  block_known_prompt_injections: true
  blocked_patterns:
    - "ignore previous instructions"
    - "system prompt:"
    - "DAN mode"

# ============================================================================
# 7. HEALTH CHECK SECURITY
# ============================================================================

health_check:
  enabled: true
  
  # Require authentication for detailed health info
  public_status_only: true
  
  # Don't expose sensitive info in health checks
  expose_provider_status: false  # Don't leak which providers are configured
  expose_credential_status: false  # Don't expose credential validity
  
  # Endpoint customization
  endpoint: "/health"
  allowed_ips_only: true

# ============================================================================
# 8. EMERGENCY CONTROLS
# ============================================================================

emergency_controls:
  # Kill switch (immediately stop processing requests)
  kill_switch_file: "/tmp/mirro-proxy-kill-switch"
  
  # Maintenance mode
  maintenance_mode_file: "/tmp/mirro-proxy-maintenance"
  
  # Graceful degradation (fallback to cheaper models on high costs)
  cost_emergency:
    threshold_usd: 500
    action: "fallback_to_cheapest_model"
    notification_webhook: "https://your-monitoring.com/alerts"

# ============================================================================
# Example Secure Deployment Configuration
# ============================================================================

# For production deployment, copy this to config/router_config.yaml
# and customize for your environment:

production_template:
  security:
    require_auth_for_health: true
  
  cors:
    allowed_origins:
      - "${FRONTEND_URL}"  # Use env var substitution
  
  rate_limiting:
    global:
      requests_per_minute: 60
  
  logging:
    redact_headers:
      - "authorization"
    log_request_bodies: false
  
  provider_security:
    rotation:
      enabled: true
      max_key_age_days: 90
