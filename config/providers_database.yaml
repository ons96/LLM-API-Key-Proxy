providers:
  openai:
    name: "OpenAI"
    type: "paid"
    api_base: "https://api.openai.com/v1"
    description: "Official OpenAI API with full model support and cost tracking"
    enabled: true
    priority: 10
    features:
      - streaming
      - function_calling
      - vision
      - json_mode
      - tools
      - parallel_tool_calls
    
    authentication:
      type: "bearer"
      env_key: "OPENAI_API_KEY"
      optional_env:
        - "OPENAI_ORGANIZATION"
        - "OPENAI_PROJECT"
    
    models:
      gpt-4o:
        id: "gpt-4o"
        name: "GPT-4o"
        context_window: 128000
        max_output_tokens: 4096
        cost_per_1k_input: 0.005
        cost_per_1k_output: 0.015
        capabilities:
          - chat
          - vision
          - json_mode
          - function_calling
          - parallel_tool_calls
      
      gpt-4o-mini:
        id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        context_window: 128000
        max_output_tokens: 16384
        cost_per_1k_input: 0.00015
        cost_per_1k_output: 0.0006
        capabilities:
          - chat
          - vision
          - json_mode
          - function_calling
          - parallel_tool_calls
      
      gpt-4-turbo:
        id: "gpt-4-turbo"
        name: "GPT-4 Turbo"
        context_window: 128000
        max_output_tokens: 4096
        cost_per_1k_input: 0.01
