# =============================================================================
# LLM Provider Database — Single Source of Truth
# =============================================================================
# This file is the master registry for all LLM API providers.
# Edit this file to add/remove providers or update model metadata.
# Run: python scripts/sync_providers.py  to push changes to router_config.yaml
# Run: python scripts/sync_providers.py --csv  to also export providers_export.csv
# =============================================================================

