    rate_limits:
      # Default Tier 1 rate limits (can be overridden per key)
      tpm: 10000  # tokens per minute
      rpm: 500    # requests per minute
      rpd: 10000  # requests per day
    
    timeouts:
      default: 600
      max_retries: 3
      backoff_factor: 2.0
    
    error_handling:
      retry_on:
        - 429  # Rate limit
        - 500  # Server error
        - 502  # Bad gateway
        - 503  # Service unavailable
        - 504  # Gateway timeout
      fail_fast_on:
        - 401  # Invalid auth
        - 403  # Permission denied
