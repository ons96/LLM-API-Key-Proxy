# Provider Status Tracker & Alerting Configuration

status_tracker:
  # How often to run health checks (in minutes)
  check_interval_minutes: 5
  
  # Number of consecutive failures before marking provider as down
  max_consecutive_failures: 3
  
  # Response time threshold for degraded status (in milliseconds)
  degraded_latency_threshold_ms: 1000
  
  # Enable alerting for outages
  enable_alerts: true

# Alerting Configuration
# These can also be set via environment variables (see below)
alerting:
  # Generic webhook configuration
  webhook_url: ""  # ALERT_WEBHOOK_URL env var
  webhook_headers: {}  # ALERT_WEBHOOK_HEADERS env var (format: "Key1:Value1,Key2:Value2")
  
  # Discord-specific webhook
  discord_webhook_url: ""  # DISCORD_WEBHOOK_URL env var
  discord_cooldown_minutes: 15  # DISCORD_ALERT_COOLDOWN_MINUTES env var
  
  # Slack-specific webhook  
  slack_webhook_url: ""  # SLACK_WEBHOOK_URL env var
  slack_cooldown_minutes: 15  # SLACK_ALERT_COOLDOWN_MINUTES env var
  
  # Alert behavior settings
  alert_on_down: true  # ALERT_ON_DOWN env var
  alert_on_recovery: true  # ALERT_ON_RECOVERY env var
  alert_on_degraded: false  # ALERT_ON_DEGRADED env var
  
  # Global cooldown to prevent spam (minutes)
  cooldown_minutes: 15  # ALERT_COOLDOWN_MINUTES env var

# Provider Health Check Endpoints
# Define specific health check endpoints for providers
health_check_endpoints:
  groq: "https://api.groq.com/openai/v1/models"
  openrouter: "https://openrouter.ai/api/v1/models"
  together: "https://api.together.xyz/v1/models"
  gemini: "https://generativelanguage.googleapis.com/v1beta/models"
  
  # G4F endpoints
  g4f_main: "http://localhost:1337/v1/models"  # Adjust based on your G4F setup
  g4f_groq: "http://localhost:1337/v1/models"
  g4f_grok: "http://localhost:1337/v1/models"
  g4f_gemini: "http://localhost:1337/v1/models"
  g4f_nvidia: "http://localhost:1337/v1/models"
