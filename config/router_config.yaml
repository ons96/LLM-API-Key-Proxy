# Router Configuration - Phase 5.1 Updated with Replicate Free Tier
providers:
  # Existing providers...
  
  replicate:
    enabled: true
    provider_type: replicate
    env_var: REPLICATE_API_TOKEN
    api_base: https://api.replicate.com/v1
    free_tier_models:
      # Meta Llama models (free tier: 100-500 requests/day)
      - meta/meta-llama-3.1-8b-instruct
      - meta/meta-llama-3.1-70b-instruct
      # Mistral models
      - mistralai/mistral-7b-instruct-v0.3
      - mistralai/mixtral-8x7b-instruct-v0.1
      # Google Gemma
      - google/gemma-2-9b-it
      - google/gemma-2-27b-it
    rate_limits:
      rpm: 10
      daily: 100
    timeout: 60.0
    health_check_interval: 300

virtual_models:
  # ... existing virtual models ...
  
  # Phase 5.1: Replicate-backed virtual models for OSS access
  coding-oss:
    description: "Open source coding models via Replicate free tier"
    fallback_chain:
      - provider: replicate
        model: meta/meta-llama-3.1-70b-instruct
        priority: 1
      - provider: replicate
        model: mistralai/mistral-7b-instruct-v0.3
        priority: 2
    settings:
      timeout_ms: 120000
      retry_on_rate_limit: true
      
  chat-oss:
    description: "Open source chat models via Replicate"
    fallback_chain:
      - provider: replicate
        model: meta/meta-llama-3.1-8b-instruct
        priority: 1
      - provider: replicate
        model: google/gemma-2-9b-it
        priority: 2
    settings:
      timeout_ms: 60000
      retry_on_rate_limit: true
