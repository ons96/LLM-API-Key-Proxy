# Router Configuration
# Phase 1.3: Rate Limiting Configuration Added

rate_limiting:
  enabled: true
  # Default rate limits for all API keys (unless overridden)
  requests_per_minute: 60
  requests_per_hour: 1000
  requests_per_day: 10000
  burst_size: 60  # Allow burst up to 60 requests
  
  # Cleanup interval for idle buckets (seconds)
  cleanup_interval: 300
  
  # Per-API-key custom limits
  # Keys are the actual API key values or key prefixes
  per_key_limits:
    # Example: Premium tier key
    "sk-premium-tier-abc123":
      rpm: 1000
      rph: 50000
      rpd: 1000000
      burst: 1000
    
    # Example: Standard tier key  
    "sk-standard-tier-xyz789":
      rpm: 120
      rph: 3000
      rpd: 50000
      burst: 120
    
    # Example: Free tier key
    "sk-free-tier-free123":
      rpm: 20
      rph: 200
      rpd: 2000
      burst: 20
  
  # IP-based limits for requests without API keys (anonymous access)
  anonymous_limits:
    enabled: true
    rpm: 10
    rph: 100
    rpd: 1000

# Existing routing configuration...
routing:
  strategy: weighted_round_robin
  health_check_interval: 30
  failover_enabled: true

logging:
  level: INFO
  rate_limit_violations: true  # Log when rate limits are hit
