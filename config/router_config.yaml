# Router Configuration
# Phase 1.3: Security Hardening - Request Size Limits

routing:
  # Existing routing configuration
  default_timeout: 30
  max_retries: 3

security:
  request_size_limits:
    enabled: true
    max_content_length_bytes: 104857600      # 100 MB for general content
    max_json_payload_bytes: 10485760         # 10 MB for JSON APIs
    check_content_length: true               # Validate Content-Length header
    reject_chunked_over_limit: true          # Reject requests without Content-Length if body > limit
    exempt_routes:
      - "/health"
      - "/healthz"
      - "/metrics"
      - "/ready"
      - "/alive"
  
  # Additional security settings placeholder
  rate_limiting:
    enabled: true

providers:
  # Existing provider configuration
  default_provider: openai
  
model_rankings:
  # Existing model ranking configuration
  fallback_strategy: "next_best"
